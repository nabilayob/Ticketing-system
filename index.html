<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSBA Maintenance System</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f9;
  margin:0;
}
.header{
  background:#1a5276;
  color:#fff;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
}
.header h1{margin:0;font-size:18px}
.container{padding:20px}
.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}
input,select,textarea{
  width:100%;
  padding:8px;
  margin-top:5px;
  margin-bottom:10px;
}
button{
  padding:10px;
  background:#1a5276;
  color:#fff;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <h1>DSBA - نظام الصيانة</h1>
</div>

<div class="container">

<div class="card">
<h3>تسجيل الدخول</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card">
<h3>إنشاء بلاغ</h3>

<select id="dept">
<option value="electricity">كهرباء</option>
<option value="it">IT</option>
</select>

<select id="type">
<option>لمبة</option>
<option>فيشة</option>
</select>

<input id="room" placeholder="A-101">

<textarea id="desc" placeholder="وصف المشكلة"></textarea>

<button onclick="sendTicket()">Send Ticket</button>

</div>

<div class="card">
<h3>التذاكر</h3>
<div id="tickets"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  function loadUserRole(uid){
  get(ref(db, "users/" + uid)).then(snap=>{
    const user = snap.val();

    if(!user){
      alert("User not found in DB");
      return;
    }

    if(user.role === "admin") showAdmin();
    if(user.role === "technician") showTechnician();
    if(user.role === "teacher") showTeacher();
  });
}

const firebaseConfig = {
  apiKey: "AIzaSyCUgpm_0w-vbtShNGvHMrnQ-om1cbO8Yuo",
  authDomain: "ticketing-system-2651c.firebaseapp.com",
  projectId: "ticketing-system-2651c",
  storageBucket: "ticketing-system-2651c.firebasestorage.app",
  messagingSenderId: "625229329187",
  appId: "1:625229329187:web:0d1b8a5e4324f409455296"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

window.login = function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  signInWithEmailAndPassword(auth,email,pass)
    .then(()=>alert("تم تسجيل الدخول"))
    .catch(e=>alert(e.message));
}

window.sendTicket = function(){

  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  signInWithEmailAndPassword(auth,email,pass)
    .then(res=>{
 function loadUserRole(uid){
  get(ref(db, "users/" + uid)).then(snap=>{
    const user = snap.val();

    if(!user){
      alert("User not found");
      return;
    }

    if(user.role === "admin") showAdmin();
    if(user.role === "technician") showTechnician();
    if(user.role === "teacher") showTeacher();
  });
}
      
    })
    .catch(e=>alert(e.message));
}

  push(ref(db,"tickets"),{
    dept,
    type,
    room,
    desc,
    status:"pending",
    createdAt: Date.now()
  });

  alert("تم إرسال البلاغ");
}

onValue(ref(db,"tickets"), snap=>{
  let html="";
  snap.forEach(t=>{
    const d = t.val();
    html += `<div>
      ${d.room} - ${d.dept} - ${d.status}
    </div>`;
  });
  document.getElementById("tickets").innerHTML = html;
});

</script>

</body>
</html>
