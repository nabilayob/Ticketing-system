<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSBA Maintenance System</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
.header{background:#1a5276;color:#fff;padding:15px}
.container{padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
input,select,textarea{width:100%;padding:8px;margin:5px 0}
button{padding:10px;background:#1a5276;color:#fff;border:none;border-radius:5px;cursor:pointer}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:8px}
th{background:#1a5276;color:#fff}
.stats{display:flex;gap:10px;margin-bottom:10px}
.stat{flex:1;background:#eef5fb;padding:10px;border-radius:10px;text-align:center}
</style>
</head>

<body>

<div class="header">
  <h2>DSBA - نظام الصيانة</h2>
</div>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginCard">
  <h3>تسجيل الدخول</h3>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- TEACHER -->
<div id="teacherPanel" style="display:none">

  <div class="card">
    <h3>إنشاء بلاغ</h3>

    <select id="dept">
      <option value="electricity">كهرباء</option>
      <option value="it">IT</option>
    </select>

    <select id="type">
      <option>لمبة</option>
      <option>فيشة</option>
    </select>

    <input id="room" placeholder="A-101">
    <textarea id="desc" placeholder="وصف المشكلة"></textarea>

    <button onclick="sendTicket()">Send Ticket</button>
  </div>

  <div class="card">
    <h3>التذاكر</h3>
    <div id="teacherTickets"></div>
  </div>

</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none">

  <div class="card">
    <h2>Admin Dashboard</h2>

    <div class="stats">
      <div class="stat">
        <h3>📊 إجمالي</h3>
        <h2 id="totalCount">0</h2>
      </div>

      <div class="stat">
        <h3>🟡 Pending</h3>
        <h2 id="pendingCount">0</h2>
      </div>

      <div class="stat">
        <h3>✅ Done</h3>
        <h2 id="doneCount">0</h2>
      </div>
    </div>

  </div>

  <div class="card">
    <h3>📋 التذاكر</h3>
    <div id="adminTable"></div>
  </div>

</div>

<!-- TECH -->
<div id="techPanel" style="display:none">

  <div class="card">
    <h2>Technician Dashboard</h2>
    <div id="techTable"></div>
  </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUgpm_0w-vbtShNGvHMrnQ-om1cbO8Yuo",
  authDomain: "ticketing-system-2651c.firebaseapp.com",
  databaseURL: "https://ticketing-system-2651c-default-rtdb.firebaseio.com",
  projectId: "ticketing-system-2651c",
  storageBucket: "ticketing-system-2651c.appspot.com",
  messagingSenderId: "625229329187",
  appId: "1:625229329187:web:0d1b8a5e4324f409455296"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;
let currentUid = null;

/* ====== LOGIN ====== */
window.login = function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  signInWithEmailAndPassword(auth,email,pass)
    .then(res=>{
      loadUser(res.user.uid);
    })
    .catch(e=>alert(e.message));
}

/* ====== LOAD USER ====== */
function loadUser(uid){
  get(ref(db,"users/"+uid)).then(snap=>{
    const user = snap.val();

    if(!user){
      alert("User not found");
      return;
    }

    currentUser = user;
    currentUid = uid;

    document.getElementById("loginCard").style.display="none";

    if(user.role==="admin") showAdmin();
    else if(user.role==="technician") showTech();
    else showTeacher();

    loadTickets();
  });
}

/* ====== PANELS ====== */
function hideAll(){
  document.getElementById("adminPanel").style.display="none";
  document.getElementById("techPanel").style.display="none";
  document.getElementById("teacherPanel").style.display="none";
}

function showAdmin(){
  hideAll();
  document.getElementById("adminPanel").style.display="block";
}

function showTech(){
  hideAll();
  document.getElementById("techPanel").style.display="block";
}

function showTeacher(){
  hideAll();
  document.getElementById("teacherPanel").style.display="block";
}

/* ====== SEND TICKET ====== */
window.sendTicket = function(){
  const dept = dept.value;
  const type = type.value;
  const room = room.value;
  const desc = desc.value;

  push(ref(db,"tickets"),{
    dept,type,room,desc,
    status:"pending",
    createdAt:Date.now(),
    createdBy:currentUid
  });

  alert("تم إرسال البلاغ");
}

/* ====== DONE ====== */
window.markDone = function(id){
  update(ref(db,"tickets/"+id),{
    status:"done"
  });
}

/* ====== LOAD TICKETS ====== */
function loadTickets(){
  onValue(ref(db,"tickets"), snap=>{

    let total=0,pending=0,done=0;

    let adminHTML=`<table><tr>
    <th>Room</th><th>Dept</th><th>Status</th><th>Action</th></tr>`;

    let techHTML=`<table><tr>
    <th>Room</th><th>Dept</th><th>Status</th><th>Action</th></tr>`;

    let teacherHTML="";

    snap.forEach(t=>{
      const d=t.val();
      total++;

      if(d.status==="pending") pending++;
      if(d.status==="done") done++;

      const btn = d.status!=="done"
        ? `<button onclick="markDone('${t.key}')">Done</button>`
        : "✔";

      adminHTML += `<tr>
      <td>${d.room}</td>
      <td>${d.dept}</td>
      <td>${d.status}</td>
      <td>${btn}</td>
      </tr>`;

      if(currentUser.role==="technician"){
        if(d.dept===currentUser.dept){
          techHTML += `<tr>
          <td>${d.room}</td>
          <td>${d.dept}</td>
          <td>${d.status}</td>
          <td>${btn}</td>
          </tr>`;
        }
      }

      if(currentUser.role==="teacher"){
        teacherHTML += `<div>${d.room} - ${d.status}</div>`;
      }
    });

    adminHTML+="</table>";
    techHTML+="</table>";

    document.getElementById("adminTable").innerHTML=adminHTML;
    document.getElementById("techTable").innerHTML=techHTML;
    document.getElementById("teacherTickets").innerHTML=teacherHTML;

    totalCount.innerText=total;
    pendingCount.innerText=pending;
    doneCount.innerText=done;

  });
}

</script>

</body>
</html>
