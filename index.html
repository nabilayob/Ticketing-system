<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSBA - Maintenance & Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

:root {
  --primary: #0f2d5c;
  --primary-light: #1a4a8a;
  --accent: #e8a020;
  --accent-light: #f5c256;
  --success: #1d9e75;
  --danger: #d85a30;
  --warning: #ef9f27;
  --bg: #f0f2f7;
  --card: #ffffff;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: rgba(0,0,0,0.08);
  --sidebar-w: 260px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SPLASH / LOGIN ── */
#loginScreen {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f2d5c 0%, #1a4a8a 50%, #0f2d5c 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
#loginScreen::before {
  content:'';
  position:absolute;
  width:600px; height:600px;
  background: radial-gradient(circle, rgba(232,160,32,0.15) 0%, transparent 70%);
  top:-100px; right:-100px;
  pointer-events:none;
}
#loginScreen::after {
  content:'';
  position:absolute;
  width:400px; height:400px;
  background: radial-gradient(circle, rgba(232,160,32,0.1) 0%, transparent 70%);
  bottom:-50px; left:-50px;
  pointer-events:none;
}
.login-box {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 48px;
  width: 420px;
  max-width: 95vw;
  position: relative;
  z-index: 1;
}
.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-logo .logo-circle {
  width: 80px; height: 80px;
  background: var(--accent);
  border-radius: 50%;
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: #fff;
  box-shadow: 0 8px 32px rgba(232,160,32,0.4);
}
.login-logo h1 { color:#fff; font-size:24px; font-weight:700; }
.login-logo p { color:rgba(255,255,255,0.6); font-size:13px; margin-top:4px; }
.login-field { margin-bottom: 18px; }
.login-field label { color: rgba(255,255,255,0.7); font-size:13px; display:block; margin-bottom:6px; }
.login-field input {
  width:100%; padding:12px 16px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  color: #fff; font-family: 'Cairo',sans-serif; font-size:14px;
  outline:none; transition: border-color 0.2s;
}
.login-field input::placeholder { color: rgba(255,255,255,0.35); }
.login-field input:focus { border-color: var(--accent); }
.login-btn {
  width:100%; padding:14px;
  background: var(--accent);
  border:none; border-radius:10px;
  color:#fff; font-family:'Cairo',sans-serif; font-size:15px; font-weight:600;
  cursor:pointer; transition: all 0.2s;
  margin-top: 8px;
}
.login-btn:hover { background: var(--accent-light); transform: translateY(-1px); }
.login-error { color:#f87171; font-size:13px; text-align:center; margin-top:12px; display:none; }

/* ── APP SHELL ── */
#app { display:none; min-height:100vh; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w);
  background: var(--primary);
  position: fixed; top:0; right:0; bottom:0;
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform 0.3s;
}
.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 12px;
}
.sidebar-logo {
  width: 42px; height: 42px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size:15px; font-weight:700; color:#fff; flex-shrink:0;
}
.sidebar-title { color:#fff; font-size:14px; font-weight:700; line-height:1.3; }
.sidebar-subtitle { color:rgba(255,255,255,0.45); font-size:11px; }

.sidebar-user {
  padding: 14px 20px;
  background: rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap:10px;
}
.user-avatar {
  width:34px; height:34px; border-radius:50%;
  background: var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:#fff; flex-shrink:0;
}
.user-info { flex:1; min-width:0; }
.user-name { color:#fff; font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-role { color:rgba(255,255,255,0.45); font-size:10px; }

.sidebar-nav { flex:1; overflow-y:auto; padding: 12px 0; }
.nav-section { padding: 8px 20px 4px; color:rgba(255,255,255,0.3); font-size:10px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px;
  color: rgba(255,255,255,0.6);
  cursor: pointer; transition: all 0.15s;
  border-right: 3px solid transparent;
  font-size: 13px;
}
.nav-item:hover { background:rgba(255,255,255,0.07); color:#fff; }
.nav-item.active { background:rgba(232,160,32,0.15); color:var(--accent); border-right-color: var(--accent); }
.nav-item .nav-icon { font-size:16px; width:20px; text-align:center; }
.nav-badge { margin-right:auto; background:var(--danger); color:#fff; font-size:10px; padding:2px 7px; border-radius:20px; }

.sidebar-footer {
  padding: 14px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.logout-btn {
  display:flex; align-items:center; gap:8px;
  color:rgba(255,255,255,0.4); font-size:12px; cursor:pointer;
  padding:6px 0; transition:color 0.15s;
}
.logout-btn:hover { color:#f87171; }

/* MAIN CONTENT */
.main {
  margin-right: var(--sidebar-w);
  min-height: 100vh;
  display: flex; flex-direction: column;
}
.topbar {
  background:#fff; border-bottom:1px solid var(--border);
  padding: 14px 28px;
  display:flex; align-items:center; gap:16px;
  position:sticky; top:0; z-index:50;
}
.topbar-title { font-size:18px; font-weight:700; color:var(--primary); flex:1; }
.topbar-actions { display:flex; align-items:center; gap:10px; }
.notif-btn {
  position:relative; width:36px; height:36px;
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; transition:background 0.15s;
}
.notif-btn:hover { background:#e5e7eb; }
.notif-badge {
  position:absolute; top:-4px; left:-4px;
  background:var(--danger); color:#fff;
  font-size:9px; padding:1px 5px; border-radius:20px; font-weight:700;
}

.content { padding: 24px 28px; flex:1; }

/* CARDS */
.card {
  background: var(--card); border-radius:14px;
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 20px;
}
.card-title {
  font-size:15px; font-weight:700; color:var(--primary);
  margin-bottom: 16px;
  display:flex; align-items:center; gap:8px;
}
.card-title .icon { font-size:18px; }

/* STAT CARDS */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px; }
.stat-card {
  background:var(--card); border-radius:12px; padding:18px;
  border: 1px solid var(--border);
  position:relative; overflow:hidden;
}
.stat-card::before {
  content:''; position:absolute;
  width:80px; height:80px; border-radius:50%;
  top:-20px; left:-20px;
  opacity:0.08;
}
.stat-card.blue::before { background:var(--primary); }
.stat-card.gold::before { background:var(--accent); }
.stat-card.green::before { background:var(--success); }
.stat-card.red::before { background:var(--danger); }
.stat-label { font-size:11px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.03em; }
.stat-value { font-size:28px; font-weight:700; margin:4px 0 0; color:var(--primary); }
.stat-card.gold .stat-value { color:var(--accent); }
.stat-card.green .stat-value { color:var(--success); }
.stat-card.red .stat-value { color:var(--danger); }
.stat-sub { font-size:11px; color:var(--text-muted); margin-top:4px; }

/* TABLES */
.tbl-wrap { overflow-x:auto; border-radius:10px; border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; min-width:600px; }
thead tr { background:var(--primary); }
th { color:#fff; padding:10px 14px; font-size:12px; font-weight:600; text-align:right; white-space:nowrap; }
td { padding:10px 14px; font-size:13px; border-bottom:1px solid var(--border); color:var(--text); }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover { background:#f8f9ff; }

/* BADGES */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-pending { background:#fff3cd; color:#856404; }
.badge-inprogress { background:#cce5ff; color:#004085; }
.badge-done { background:#d4edda; color:#155724; }
.badge-deptadmin { background:#ede9fe; color:#5b21b6; }
.badge-it { background:#e8eaf6; color:#3949ab; }
.badge-elec { background:#fff8e1; color:#f57f17; }
.badge-civil { background:#fce4ec; color:#c2185b; }

/* FORMS */
.form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group label { font-size:12px; font-weight:600; color:var(--text-muted); }
.form-group input, .form-group select, .form-group textarea {
  padding:9px 12px;
  border:1px solid #d1d5db; border-radius:8px;
  font-family:'Cairo',sans-serif; font-size:13px;
  color:var(--text); background:#fff;
  outline:none; transition:border-color 0.15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--primary-light);
  box-shadow: 0 0 0 3px rgba(26,74,138,0.08);
}
.form-group textarea { min-height:80px; resize:vertical; }
.form-full { grid-column: 1/-1; }

/* BUTTONS */
.btn { padding:9px 18px; border:none; border-radius:8px; font-family:'Cairo',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-light); }
.btn-accent { background:var(--accent); color:#fff; }
.btn-accent:hover { background:var(--accent-light); }
.btn-success { background:var(--success); color:#fff; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-sm { padding:5px 12px; font-size:12px; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text-muted); }
.btn-outline:hover { background:var(--bg); }

/* TABS */
.tabs { display:flex; gap:4px; border-bottom:2px solid var(--border); margin-bottom:20px; }
.tab {
  padding:8px 18px; font-size:13px; font-weight:600; cursor:pointer;
  border-bottom:2px solid transparent; margin-bottom:-2px;
  color:var(--text-muted); transition:all 0.15s;
}
.tab.active { color:var(--primary); border-bottom-color:var(--primary); }

/* NOTIFICATIONS PANEL */
.notif-panel {
  position:fixed; top:60px; left:20px;
  width:320px; background:#fff;
  border-radius:14px; border:1px solid var(--border);
  box-shadow:0 8px 40px rgba(0,0,0,0.12);
  z-index:200; display:none; max-height:400px; overflow-y:auto;
}
.notif-panel.open { display:block; }
.notif-header { padding:14px 16px; font-weight:700; font-size:14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.notif-item { padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
.notif-item:hover { background:var(--bg); }
.notif-item:last-child { border-bottom:none; }
.notif-item.unread { background:#fef9f0; }
.notif-title { font-size:12px; font-weight:600; margin-bottom:2px; }
.notif-msg { font-size:11px; color:var(--text-muted); }
.notif-time { font-size:10px; color:var(--text-muted); margin-top:4px; }

/* MODAL */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.4); z-index:300;
  align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:#fff; border-radius:16px; padding:28px;
  width:560px; max-width:95vw; max-height:85vh; overflow-y:auto;
  position:relative;
}
.modal-title { font-size:17px; font-weight:700; color:var(--primary); margin-bottom:20px; }
.modal-close { position:absolute; top:16px; left:16px; cursor:pointer; font-size:20px; color:var(--text-muted); background:none; border:none; line-height:1; }
.modal-close:hover { color:var(--danger); }
.modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }

/* BARCODE BADGE */
.barcode-badge {
  display:inline-block; padding:4px 10px;
  background:#1a1a2e; color:#fff;
  font-family:monospace; font-size:11px;
  border-radius:6px; letter-spacing:0.08em;
}

/* PROGRESS */
.progress { height:6px; background:#e5e7eb; border-radius:10px; overflow:hidden; }
.progress-bar { height:100%; border-radius:10px; transition:width 0.4s; }

/* PAGES */
.page { display:none; }
.page.active { display:block; }

/* PRIORITY */
.priority-high { color:var(--danger); font-weight:600; }
.priority-med { color:var(--warning); font-weight:600; }
.priority-low { color:var(--success); font-weight:600; }

/* EMPTY STATE */
.empty { text-align:center; padding:40px 20px; color:var(--text-muted); }
.empty-icon { font-size:40px; margin-bottom:12px; }
.empty-text { font-size:14px; }


/* ONLINE STATUS */
.online-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin:0 4px; }
.online-dot.on { background:var(--success); box-shadow:0 0 0 3px rgba(29,158,117,.12); }
.online-dot.off { background:#9ca3af; }
.status-online { color:var(--success); font-weight:700; font-size:11px; }
.status-offline { color:var(--text-muted); font-weight:600; font-size:11px; }

/* COST TAG */
.cost-tag { background:#eef5fb; color:var(--primary); padding:3px 10px; border-radius:6px; font-size:12px; font-weight:700; }

/* INVENTORY GRID */
.inv-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
.inv-card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:14px; }
.inv-card-img { width:40px; height:40px; background:var(--bg); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:22px; margin-bottom:10px; }
.inv-card-name { font-size:13px; font-weight:700; margin-bottom:4px; }
.inv-card-loc { font-size:11px; color:var(--text-muted); }
.inv-card-status { margin-top:8px; }

/* REPORT SECTION */
.report-block { background:#fff; border-radius:10px; border:1px solid var(--border); padding:16px; margin-bottom:14px; }
.report-block h4 { font-size:13px; font-weight:700; margin-bottom:12px; color:var(--primary); }
.bar-chart { }
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.bar-label { font-size:12px; color:var(--text-muted); min-width:120px; text-align:right; }
.bar-fill-wrap { flex:1; height:20px; background:#f0f2f7; border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-right:8px; font-size:11px; font-weight:600; color:#fff; transition:width 1s; }

/* AGENT PANEL */
.agent-log { background:#0f2d5c; color:#7dff7d; font-family:monospace; font-size:12px; padding:16px; border-radius:10px; height:200px; overflow-y:auto; }
.agent-log p { margin-bottom:4px; }
.agent-log .cmd { color:#f5c256; }
.agent-log .info { color:#7dff7d; }
.agent-log .warn { color:#ff9f43; }

/* SCROLLBAR */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:10px; }

@media (max-width:768px) {
  .sidebar { transform:translateX(100%); }
  .sidebar.open { transform:translateX(0); }
  .main { margin-right:0; }
}

/* ── LANGUAGE SWITCHER ── */
.lang-switcher { display:flex; gap:4px; align-items:center; }
.lang-btn {
  padding:4px 10px; border:1px solid rgba(255,255,255,0.25);
  border-radius:6px; background:transparent; color:rgba(255,255,255,0.55);
  font-size:11px; font-weight:700; cursor:pointer; letter-spacing:.04em;
  transition:all .15s; font-family:'Cairo',sans-serif;
}
.lang-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
.lang-btn.active-lang { background:var(--accent); border-color:var(--accent); color:#fff; }

/* ── LANGUAGE SWITCHER ── */
.lang-switcher{display:flex;gap:4px;align-items:center;}
.lang-btn{padding:4px 10px;border:1px solid rgba(255,255,255,0.25);border-radius:6px;
  background:transparent;color:rgba(255,255,255,0.55);font-size:11px;font-weight:700;
  cursor:pointer;letter-spacing:.04em;transition:all .15s;font-family:'Cairo',sans-serif;}
.lang-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.lang-btn.active-lang{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ══════════════════════════════════════════════
   HELP SYSTEM STYLES
══════════════════════════════════════════════ */

/* Help Button (❓) in topbar */
.help-btn {
  width:36px; height:36px;
  background: var(--accent);
  border:none; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; font-weight:700;
  color:#fff; transition: all 0.2s;
  position:relative;
  font-family:'Cairo',sans-serif;
}
.help-btn:hover { background: var(--accent-light); transform:scale(1.05); box-shadow:0 4px 12px rgba(232,160,32,0.4); }
.help-btn::after {
  content:'مساعدة';
  position:absolute; bottom:-26px; right:50%; transform:translateX(50%);
  background:#1a1a2e; color:#fff; font-size:10px;
  padding:2px 8px; border-radius:4px; white-space:nowrap;
  opacity:0; transition:opacity 0.2s; pointer-events:none;
  font-family:'Cairo',sans-serif;
}
.help-btn:hover::after { opacity:1; }

/* ── Context Help Modal ── */
.help-modal-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
  z-index:9990; display:none; align-items:center; justify-content:center;
  padding:20px;
}
.help-modal-overlay.open { display:flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.help-modal {
  background:#fff; border-radius:20px;
  width:680px; max-width:95vw; max-height:88vh;
  display:flex; flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,0.2);
  overflow:hidden; animation: slideUp 0.25s ease;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

.help-modal-header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  padding:20px 24px; display:flex; align-items:center; gap:14px; flex-shrink:0;
}
.help-modal-icon {
  width:46px; height:46px; background:var(--accent); border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.help-modal-title { color:#fff; font-size:17px; font-weight:700; flex:1; }
.help-modal-subtitle { color:rgba(255,255,255,0.6); font-size:12px; margin-top:2px; }
.help-modal-close {
  width:32px; height:32px; background:rgba(255,255,255,0.15); border:none;
  border-radius:8px; color:#fff; font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:background 0.15s;
}
.help-modal-close:hover { background:rgba(255,255,255,0.25); }

.help-modal-tabs {
  display:flex; border-bottom:1px solid #e5e7eb;
  background:#f9fafb; flex-shrink:0; overflow-x:auto;
}
.help-tab-btn {
  padding:12px 20px; border:none; background:transparent;
  font-family:'Cairo',sans-serif; font-size:13px; font-weight:600;
  color:var(--text-muted); cursor:pointer; white-space:nowrap;
  border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:all 0.15s; display:flex; align-items:center; gap:6px;
}
.help-tab-btn:hover { color:var(--primary); background:#f0f4ff; }
.help-tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); background:#fff; }

.help-modal-body { flex:1; overflow-y:auto; padding:24px; }

function t(k){ return (L[k]&&L[k][currentLang])||( L[k]&&L[k]['ar'])||k; }

function applyLanguage(lang){
  currentLang = lang;
  localStorage.setItem('dsba_lang', lang);
  var rtl = lang==='ar';
  document.documentElement.lang = lang;
  document.documentElement.dir = rtl ? 'rtl' : 'ltr';
  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.classList.toggle('active-lang', b.dataset.lang===lang);
  });
  // Re-render login or app
  if(document.getElementById('loginScreen').style.display!=='none'||!CU){
    renderLogin();
  } else {
    renderStaticUI();
    refreshPage();
  }
}

function renderLogin(){
  var isRTL = currentLang==='ar';
  document.documentElement.dir = isRTL?'rtl':'ltr';
  document.getElementById('loginScreen').innerHTML = `

function renderStaticUI(){

  if(lo) lo.innerHTML=(currentLang==='ar'?'⬅ ':'➡ ')+t('logout');

  if(ls) ls.innerHTML=
    '<button class="lang-btn '+(currentLang==='ar'?'active-lang':'')+'" data-lang="ar" onclick="applyLanguage(\'ar\')">عربي</button>'+

function openStoreModal(){
  // Populate stores
  const sSel=$('s_store');
  sSel.innerHTML='<option value="">-- اختر المخزن --</option>';
  get(ref(db,'store_inventory')).then(snap=>{
    const inv=snap.val()||{};
    Object.entries(inv).forEach(([k,s])=>{
      sSel.innerHTML+=`<option value="${k}">${s.icon||'🏪'} ${s.name}</option>`;
    });
  });
  // Populate pending tickets
  const tSel=$('s_ticket');
  tSel.innerHTML='<option value="">-- اختر بلاغ (اختياري) --</option>';
  Object.entries(tickets).filter(([,t])=>t.status!=='done').forEach(([k,t])=>{
    tSel.innerHTML+=`<option value="${k}">[${k.substr(0,6)}] ${t.type||''} - ${t.room||''}</option>`;
  });
  // Populate locations
  const lSel=$('s_location');
  lSel.innerHTML='<option value="">-- اختر الموقع --</option>';
  settings.buildings.forEach(b=>{
    b.rooms.forEach(r=>{ lSel.innerHTML+=`<option value="${b.name} - ${r}">${b.name} / ${r}</option>`; });

window.onItemSelect=function(){
  const storeId=$('s_store').value, itemId=$('s_item_select').value;
  if(!storeId||!itemId){ $('s_balance').textContent='—'; return; }
  get(ref(db,`store_inventory/${storeId}/items/${itemId}`)).then(snap=>{
    const it=snap.val()||{};
    const bal=$('s_balance');
    bal.textContent=`${it.balance||0} ${it.unit||'قطعة'} متاح`;
    bal.style.color=(it.balance||0)>0?'var(--success)':'var(--danger)';
    if(it.unit_cost) $('s_unit_cost').value=it.unit_cost;
    calcStoreCost();
  });
};

window.calcStoreCost=function(){
  const qty=parseInt($('s_qty')?.value)||1;
  const uc=parseFloat($('s_unit_cost')?.value)||0;
  const total=qty*uc;
  const el=$('s_total_display');
  if(el) el.textContent=total.toLocaleString('ar-EG')+' ج';
};

window.submitStoreIssue=function(){
  const storeId=$('s_store').value, itemId=$('s_item_select').value;
  const ticketId=$('s_ticket').value, location=$('s_location').value;
  const qty=parseInt($('s_qty').value)||1;
  const unitCost=parseFloat($('s_unit_cost').value)||0;
  const totalCost=qty*unitCost;
  const note=$('s_note').value;

  if(!storeId||!itemId){ alert('اختر المخزن والقطعة'); return; }

  get(ref(db,`store_inventory/${storeId}/items/${itemId}`)).then(snap=>{
    const it=snap.val()||{};
    const curBal=it.balance||0;
    if(qty>curBal){ alert(`الرصيد المتاح ${curBal} فقط - لا يمكن صرف ${qty}`); return; }

    // Deduct balance
    update(ref(db,`store_inventory/${storeId}/items/${itemId}`),{
      balance: curBal-qty,
      lastUpdated: Date.now()
    });

    // Record transaction
    push(ref(db,'store_transactions'),{
      storeId, storeName: $('s_store').selectedOptions[0]?.text||storeId,
      itemId, itemName: it.name,
      qty, unitCost, totalCost, location, ticketId, note,
      time: Date.now(), byId:CID, byName:CU.name||''
    });

    // Update ticket cost
    if(ticketId && tickets[ticketId]){
      const oldC=tickets[ticketId].cost||0;
      update(ref(db,'tickets/'+ticketId),{cost:oldC+totalCost});
    }
    closeModal('storeModal');
    alert(`✅ تم صرف ${qty} ${it.unit||'قطعة'} من ${it.name} — الرصيد الجديد: ${curBal-qty}`);
  });
};

window.addInvItem=function(sid){

  const balance=parseFloat($('inv_ibal').value)||0;

};

window.adjustBalance=function(sid,iid,dir){
  const qty=parseInt($('adj_'+iid)?.value)||1;
  get(ref(db,`store_inventory/${sid}/items/${iid}`)).then(snap=>{
    const it=snap.val()||{};
    const newBal=Math.max(0,(it.balance||0)+(dir*qty));
    update(ref(db,`store_inventory/${sid}/items/${iid}`),{balance:newBal, lastUpdated:Date.now()});
    // Log as addition transaction if adding
    if(dir>0){
      push(ref(db,'store_transactions'),{
        storeId:sid, storeName:it.storeName||sid,
        itemId:iid, itemName:it.name,
        qty, unitCost:it.unit_cost||0, totalCost:(it.unit_cost||0)*qty,
        type:'addition', location:'المخزن', ticketId:'', note:'إضافة رصيد',
        time:Date.now(), byId:CID, byName:CU.name||''
      });

    setTimeout(()=>openManageStore(sid),300);
  });
};

// AUTO-TIMESHEET: Create entry when ticket assigned to tech
// ════════════════════════════════════════════════════════════
function autoAddToTimesheet(techId, techName, techDept, ticketId, tk){
  var now    = new Date();
  var date   = now.toISOString().split('T')[0];
  var startT = now.toTimeString().substr(0,5);
  var loc    = [tk.building, tk.floor, tk.room].filter(Boolean).join(' / ');
  var entry  = {
    taskName:    (tk.type||'صيانة') + (loc?' — '+loc:''),
    date:        date,
    startTime:   startT,
    endTime:     '',
    notes:       tk.desc ? tk.desc.substr(0,80) : '',
    uid:         techId,
    userName:    techName,
    userDept:    techDept||'',
    ticketId:    ticketId,
    autoAdded:   true,
    createdAt:   Date.now()
  };
  return push(ref(db,'timesheet/'+techId), entry);
}

// Auto-set endTime when ticket resolved
function autoEndTimesheetEntry(techId, ticketId){
  var nowTime = new Date().toTimeString().substr(0,5);
  // Find the entry linked to this ticketId
  get(ref(db,'timesheet/'+techId)).then(function(snap){
    var data = snap.val()||{};
    Object.entries(data).forEach(function(e){
      var entryId = e[0], entry = e[1];
      if(entry.ticketId===ticketId && !entry.endTime){
        update(ref(db,'timesheet/'+techId+'/'+entryId), {endTime: nowTime});
      }
    });
  }).catch(function(){});
}

window.assignTicketDo=function(evtOrNull, ticketId, techId, techName){
  try{ techName=decodeURIComponent(techName); }catch(_e){}
  update(ref(db,'tickets/'+ticketId),{
    assignedTo:techId, assignedName:techName,
    status:'inprogress', assignedAt:Date.now()
  });
  var tk=tickets[ticketId]||{};
  // ── Auto-add to technician's timesheet ──────────────────
  var techUser=users[techId]||{};
  autoAddToTimesheet(techId, techName, techUser.dept||tk.dept||'', ticketId, tk)
    .then(function(ref2){
      console.log('Timesheet entry created: '+ref2.key);
    }).catch(function(err){
      console.warn('Timesheet auto-add failed:', err);
    });
  // ── Notifications ────────────────────────────────────────
  sendNotification(techId,'🔧 تم تعيينك على بلاغ',
    'تم تعيينك للعمل على بلاغ '+(tk.type||'')+' في '+(tk.room||''),ticketId);
  if(tk.createdBy) sendNotification(tk.createdBy,'👷 تم تعيين فني لبلاغك',
    'تم تعيين الفني '+techName+' لحل مشكلتك',ticketId);
  var ov=document.getElementById('_assignOverlay');
  if(ov) ov.remove();
  closeModal('ticketDetailModal');
};

window.assignTicket=function(ticketId, techId, techName){
  update(ref(db,'tickets/'+ticketId),{ assignedTo:techId, assignedName:techName, status:'inprogress', assignedAt:Date.now() });
  sendNotification(techId,'🔧 تم تعيينك على بلاغ',`تم تعيينك للعمل على بلاغ ${tickets[ticketId]?.type||''} في ${tickets[ticketId]?.room||''}`,ticketId);
  sendNotification(tickets[ticketId]?.createdBy,'👷 تم تعيين فني لبلاغك',`تم تعيين الفني ${techName} لحل مشكلتك`,ticketId);
  closeModal('assignModal');

// ─── TICKET STATUS FUNCTIONS ───
function changeTicketStatus(id, status){
  const t=tickets[id]; if(!t) return;
  update(ref(db,'tickets/'+id),{status, updatedAt:Date.now()});
  if(status==='inprogress'){
    sendNotification(t.createdBy,'🔧 بدأ العمل على بلاغك',`الفني بدأ العمل على مشكلة ${t.type||''} في ${t.room||''}`,id);
  }
  closeModal('ticketDetailModal');
}

function resolveTicket(id){
  const note=$('res_note')?.value||'';
  const cost=parseFloat($('res_cost')?.value)||0;
  const t=tickets[id]; if(!t) return;

  update(ref(db,'tickets/'+id),{
    status:'done', resolution:note, cost,
    resolvedAt:Date.now(), resolvedBy:CID, resolvedByName:CU.name||''
  });

  // ── Auto-close timesheet entry for the assigned tech ──
  var resolverUid = t.assignedTo || CID;
  autoEndTimesheetEntry(resolverUid, id);

  // ── in-app notification ──
  sendNotification(t.createdBy,'✅ تم حل بلاغك',
    'تم حل مشكلة '+(t.type||'')+' في '+(t.room||'')+(note?' — السبب: '+note:''),id);

  // ── EMAIL to ticket creator ──
  emailTicketResolved(id, t, note, cost);

  closeModal('ticketDetailModal');
}

// ─── REOPEN TICKET ───
window.reopenTicket=function(id){
  if(!isAnyAdmin()){ alert('غير مصرح'); return; }
  const reason=prompt('سبب إعادة الفتح (اختياري):','');
  if(reason===null) return;
  const t=tickets[id]; if(!t) return;
  if(!canManageDept(t.dept)){ alert('غير مصرح لهذا القسم'); return; }
  update(ref(db,'tickets/'+id),{
    status:'pending',
    reopenedAt:Date.now(), reopenedBy:CID, reopenedByName:CU.name||'',
    reopenReason:reason,
    assignedTo:null, assignedName:null,
    resolution:null, resolvedAt:null
  });
  // notify original technician if was assigned
  if(t.assignedTo){
    sendNotification(t.assignedTo,'🔄 تم إعادة فتح البلاغ',
      `تم إعادة فتح بلاغ ${t.type||''} في ${t.room||''}${reason?' — السبب: '+reason:''}`,id);
  }
  // notify ticket creator
  sendNotification(t.createdBy,'🔄 تم إعادة فتح بلاغك',
    `تم إعادة فتح بلاغك من قِبل الإدارة`,id);
  closeModal('ticketDetailModal');
};

// ─── TRANSFER TICKET TO ANOTHER TECHNICIAN ───

window.transferTicket=function(ticketId, newTechId, newTechName){
  const t=tickets[ticketId]; if(!t) return;
  const oldTechId=t.assignedTo;
  const oldTechName=t.assignedName||'';
  update(ref(db,'tickets/'+ticketId),{
    assignedTo:newTechId, assignedName:newTechName,
    status:'inprogress', transferredAt:Date.now(),
    transferredFrom:oldTechId, transferredFromName:oldTechName,
    transferredBy:CID
  });
  // Notify new technician
  sendNotification(newTechId,'🔄 تم تحويل بلاغ إليك',
    `تم تحويل بلاغ ${t.type||''} في ${t.room||''} من الفني ${oldTechName}`,ticketId);
  // Notify old technician
  if(oldTechId){
    sendNotification(oldTechId,'🔄 تم تحويل بلاغك',
      `تم تحويل بلاغ ${t.type||''} في ${t.room||''} إلى الفني ${newTechName}`,ticketId);
  }
  // Notify ticket creator
  sendNotification(t.createdBy,'👷 تم تغيير الفني المسؤول',
    `الفني ${newTechName} أصبح مسؤولاً عن بلاغك`,ticketId);
  closeModal('assignModal');
  // Reset modal title
  $('assignModal').querySelector('.modal-title').textContent='👷 تعيين فني للبلاغ';
};

window.switchSettingsTab=function(tab, el){
  // Robust tab switching: do not rely on global `event`, because some browsers
  // do not expose it and programmatic calls like openModal('settingsModal')
  // have no event at all.
  document.querySelectorAll('#settingsTabs .tab').forEach(function(t){
    t.classList.remove('active');
  });

  if(!el){
    el = document.querySelector('#settingsTabs .tab[data-tab="'+tab+'"]') ||
         Array.from(document.querySelectorAll('#settingsTabs .tab')).find(function(t){
           return (t.getAttribute('onclick')||'').indexOf("'"+tab+"'") !== -1;
         });
  }
  if(el) el.classList.add('active');

  renderSettingsTab(tab);
};

function loadCurrentUser(uid){
  get(ref(db,'users/'+uid)).then(function(snap){
    var u=snap.val();
    if(!u){ u={name:'Admin',role:'admin',email:auth.currentUser?.email||''}; set(ref(db,'users/'+uid),u); }
    CU=u; CID=uid;
    setMyOnlineState(true);
    setupOnlinePresence(uid);
    if(window._onlineHeartbeat) clearInterval(window._onlineHeartbeat);
    window._onlineHeartbeat=setInterval(function(){ setMyOnlineState(true); },60000);
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('sidebarName').textContent=CU.name||CU.email||'—';
    document.getElementById('sidebarAvatar').textContent=(CU.name||'?').charAt(0).toUpperCase();
    renderStaticUI();
    renderModals();
    startListeners();
    showPage('dashboard');
  });
}

function startListeners(){
  // Fetch public IP once at login so it's ready for tickets
  fetch('https://api.ipify.org?format=json')
    .then(function(r){return r.json();})
    .then(function(d){ window._dsbaClientIP = d.ip; })
    .catch(function(){ window._dsbaClientIP = 'N/A'; });

  onValue(ref(db,'tickets'),function(snap){ tickets=snap.val()||{}; updateBadges(); refreshPage(); });
  onValue(ref(db,'assets'),function(snap){
    assets=snap.val()||{};
    refreshPage();
    // Check warranty alerts when assets load
    setTimeout(checkWarrantyAlerts, 2000);
  });
  onValue(ref(db,'users'),function(snap){ users=snap.val()||{}; refreshPage(); });
  onValue(ref(db,'notifications'),function(snap){
    var all=snap.val()||{};
    notifications=Object.entries(all)
      .filter(function(e){ return e[1].to===CID||e[1].to==='all'; })
      .map(function(e){ return Object.assign({id:e[0]},e[1]); })
      .sort(function(a,b){ return b.time-a.time; });
    renderNotifications();
  });
}

function updateBadges(){
  var unread=notifications.filter(function(n){return !n.read;}).length;
  var badge=$('notifBadge');
  if(badge){ badge.textContent=unread; badge.style.display=unread>0?'':'none'; }
}

function sendNotification(to,title,msg,ticketId){

}

function normEmail(e){ return (e||'').toString().trim().toLowerCase(); }
function currentUserEmail(){ return normEmail((CU&&CU.email)||(auth.currentUser&&auth.currentUser.email)||''); }

function setupOnlinePresence(uid){
  // Realtime Firebase presence: if the browser loses connection, Firebase sets the user offline automatically.
  try{ ref(db,'users/'+uid).onDisconnect().update({online:false,lastSeen:Date.now()}); }catch(e){}
  // Also protect against duplicated user records with the same email (common after manual user creation).
  try{
    get(ref(db,'users')).then(function(snap){
      var email=currentUserEmail();
      var all=snap.val()||{};
      Object.keys(all).forEach(function(id){
        if(id!==uid && email && normEmail(all[id].email)===email){
          try{ ref(db,'users/'+id).onDisconnect().update({online:false,lastSeen:Date.now()}); }catch(e){}
        }
      });
    });
  }catch(e){}
}

function setMyOnlineState(isOnline){
  if(!CID) return;
  var data={online:!!isOnline,lastSeen:Date.now()};
  update(ref(db,'users/'+CID),data).catch(function(){});
  // Update any duplicate row that has the same email, so the Users table shows the real status.
  try{
    get(ref(db,'users')).then(function(snap){
      var email=currentUserEmail();
      if(!email) return;
      var all=snap.val()||{};
      Object.keys(all).forEach(function(id){
        if(id!==CID && normEmail(all[id].email)===email){
          update(ref(db,'users/'+id),data).catch(function(){});
        }
      });
    });
  }catch(e){}
}
function fmtLastSeen(ts){
  if(!ts) return '—';
  var diff=Date.now()-ts;
  if(diff<60000) return currentLang==='ar'?'الآن':'now';
  if(diff<3600000) return Math.floor(diff/60000)+' min';
  if(diff<86400000) return Math.floor(diff/3600000)+' h';
  return fmt_date(ts);
}
function userIsOnline(u){
  if(!u) return false;
  // Treat fresh heartbeat as online even if the boolean flag was not written yet.
  return !!u.online || (!!u.lastSeen && (Date.now()-Number(u.lastSeen) < 130000));
}
function onlineBadge(u,withLastSeen){
  var isOn=userIsOnline(u);
  var html='<span class="online-dot '+(isOn?'on':'off')+'"></span><span class="'+(isOn?'status-online':'status-offline')+'">'+(isOn?t('online_yes'):t('online_no'))+'</span>';
  if(withLastSeen && !isOn) html+='<div style="font-size:10px;color:var(--text-muted);margin-top:2px;">'+t('last_seen')+': '+fmtLastSeen(u&&u.lastSeen)+'</div>';
  return html;
}
window.addEventListener('beforeunload',function(){ if(CID) setMyOnlineState(false); });

function renderNotifications(){
  updateBadges();
  var list=$('notifList'); if(!list) return;
  list.innerHTML=notifications.length
    ? notifications.slice(0,20).map(function(n){
        return '<div class="notif-item '+(n.read?'':'unread')+'" onclick="readNotif(\\"'+n.id+'\\",\\"'+n.ticketId+'\\")">'+
          '<div class="notif-title">'+(n.title||'')+'</div>'+
          '<div class="notif-msg">'+(n.msg||'')+'</div>'+
          '<div class="notif-time">'+fmt_time(n.time)+'</div></div>';
      }).join('')
    : '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">'+t('notif_empty')+'</div>';
}

// ─── ROLE HELPERS ────────────────────────────────────────────
function isSuperAdmin(){ return CU && CU.role==='admin'; }
function isDeptAdmin(){  return CU && CU.role==='dept_admin'; }
function isAnyAdmin(){   return isSuperAdmin() || isDeptAdmin(); }

// Get departments this user can manage
function myManagedDepts(){
  if(isSuperAdmin()) return null; // null = all depts
  if(isDeptAdmin())  return CU.depts || (CU.dept ? [CU.dept] : []);
  return [];
}

// Can this user manage a specific dept?
function canManageDept(deptId){
  if(isSuperAdmin()) return true;
  if(isDeptAdmin()){
    var myD = myManagedDepts();
    return myD && myD.indexOf(deptId) !== -1;
  }
  return false;
}

// Can this user see a ticket?
function canSeeTicket(tk){
  if(isSuperAdmin()) return true;
  if(isDeptAdmin())  return canManageDept(tk.dept);
  if(CU.role==='technician') return tk.dept === CU.dept;
  if(CU.role==='teacher')    return tk.createdBy === CID;
  return false;
}

// Get techs this admin can assign
function myTechs(){
  var myD = myManagedDepts();
  return Object.entries(users).filter(function(e){
    if(e[1].role !== 'technician') return false;
    if(!myD) return true; // superadmin sees all
    return myD.indexOf(e[1].dept) !== -1;
  });
}

function role_label(r, depts){
  var m={admin:'role_admin',teacher:'role_teacher',technician:'role_technician',storekeeper:'role_storekeeper'};
  if(r==='dept_admin'){
    var dnames=(depts||[]).map(function(d){
      var dobj=(settings.depts||[]).find(function(x){return x.id===d;});
      return dobj ? dobj.icon+' '+dobj.name : d;
    }).join(', ');
    return 'مدير قسم' + (dnames ? ' ('+dnames+')' : '');
  }
  return m[r]?t(m[r]):r;
}

// ─── TECH AVAILABILITY ──────────────────────────────────────
// Returns: { name, busy, taskCount }
// busy = true if tech has open (unresolved) tickets assigned to them
function getTechStatus(techId, excludeTicketId){
  if(!techId) return null;
  var u = users[techId];
  if(!u) return null;
  // Count OTHER open tickets assigned to this tech (exclude current ticket)
  var otherOpenTasks = Object.entries(tickets).filter(function(e){
    var tid = e[0], tk = e[1];
    return tk.assignedTo === techId &&
           tk.status !== 'done' &&
           tid !== excludeTicketId;
  });
  return {
    name:      u.name || '—',
    dept:      u.dept || '',
    busy:      otherOpenTasks.length > 0,
    taskCount: otherOpenTasks.length,
    online:    userIsOnline(u)
  };
}

function buildTicketsTable(arr){
  if(!arr.length) return '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">'+t('empty_tickets')+'</div></div>';

    '<th>#</th><th>'+t('th_location')+'</th><th>'+t('th_dept')+'</th>'+

    '<th>الفني المعين</th>'+
    '<th>'+t('th_submitter')+'</th><th>'+t('th_date')+'</th><th>'+t('th_cost')+'</th>'+
    '<th>'+t('th_actions')+'</th>'+
    '</tr></thead><tbody>'+
    arr.map(function(tk){
      var id=tk.id;
      var loc=([tk.building,tk.floor,tk.room].filter(Boolean).join(' / '))||'—';
      var isPending=(tk.status==='pending');

      // ── Tech cell ─────────────────────────────────────────
      var techCell;
      if(!tk.assignedTo){
        techCell = '<span style="font-size:11px;color:var(--text-muted);">—</span>';
      } else {
        var ts = getTechStatus(tk.assignedTo, id); // exclude THIS ticket
        if(ts){
          var onlineDot = ts.online
            ? '<span style="width:7px;height:7px;border-radius:50%;background:#1d9e75;'+
              'display:inline-block;margin-left:4px;" title="متصل الآن"></span>'
            : '<span style="width:7px;height:7px;border-radius:50%;background:#d1d5db;'+
              'display:inline-block;margin-left:4px;" title="غير متصل"></span>';
          var nameRow = '<div style="font-size:12px;font-weight:600;display:flex;align-items:center;gap:3px;">'+
            onlineDot + ts.name + '</div>';
          // Only show busy/available badge for ACTIVE (not done) tickets
          var availBadge = '';
          if(tk.status !== 'done'){
            availBadge = ts.busy
              ? '<span style="display:inline-block;background:#fef3c7;color:#92400e;border-radius:10px;'+
                'padding:1px 7px;font-size:10px;font-weight:700;margin-top:2px;">'+
                '🔴 مشغول ('+ts.taskCount+' مهام أخرى)</span>'
              : '<span style="display:inline-block;background:#d1fae5;color:#065f46;border-radius:10px;'+
                'padding:1px 7px;font-size:10px;font-weight:700;margin-top:2px;">'+
                '🟢 متاح</span>';
          }
          techCell = '<div style="min-width:110px;">' + nameRow + availBadge + '</div>';
        } else {
          techCell = '<span style="font-size:11px;color:var(--text-muted);">'+(tk.assignedName||'—')+'</span>';
        }
      }

      var canActTicket = isAnyAdmin() && canManageDept(tk.dept);
      var actionBtns=
        '<button class="btn btn-sm btn-outline" onclick="showTicketDetail(\''+id+'\')">'+t('btn_details')+'</button>'+
        (canActTicket&&isPending
          ? ' <button class="btn btn-sm btn-accent" title="تعيين فني" onclick="openAssignModal(\''+id+'\')">👷</button>'
          : '')+
        (canActTicket&&tk.assignedTo&&tk.status!=='done'
          ? ' <button class="btn btn-sm btn-outline" title="تحويل لفني آخر" onclick="openTransferModal(\''+id+'\')">↔️</button>'
          : '')+
        (isSuperAdmin()
          ? ' <button class="btn btn-sm btn-danger" title="حذف" onclick="deleteTicket(\''+id+'\')">🗑</button>'
          : '');

      return '<tr>'+
        '<td><code style="font-size:11px;">'+id.substr(0,8)+'</code></td>'+
        '<td style="font-size:12px;">'+loc+'</td>'+
        '<td>'+dept_badge(tk.dept)+'</td>'+
        '<td style="font-size:12px;">'+(tk.type||'—')+'</td>'+
        '<td>'+priority_span(tk.priority)+'</td>'+
        '<td>'+status_badge(tk.status)+'</td>'+
        '<td>'+techCell+'</td>'+
        '<td style="font-size:12px;">'+(tk.createdByName||'—')+'</td>'+
        '<td style="font-size:12px;">'+fmt_date(tk.createdAt)+'</td>'+
        '<td>'+(tk.cost?'<span class="cost-tag">'+parseFloat(tk.cost).toLocaleString()+' '+t('currency')+'</span>':'—')+'</td>'+
        '<td style="white-space:nowrap;">'+actionBtns+'</td>'+
        '</tr>';
    }).join('')+'</tbody></table>';

window.submitTicket=function(){
  var dept=$('t_dept').value, type=$('t_type').value, priority=$('t_priority').value;
  var building=$('t_building').value, floor=$('t_floor').value, room=$('t_room').value;
  var desc=$('t_desc').value, cost=$('t_cost').value;
  if(!dept||!type||!desc){ alert(t('err_ticket_req')); return; }
  var bname=(settings.buildings||[]).find(function(b){return b.id===building;}); bname=bname?bname.name:building;

  // ── Auto-collect PC info ──────────────────────────────────
  var ua = navigator.userAgent || '';
  var pcOS = 'Unknown OS';
  if(ua.indexOf('Windows NT 10')!==-1) pcOS='Windows 10/11';
  else if(ua.indexOf('Windows NT 6.3')!==-1) pcOS='Windows 8.1';
  else if(ua.indexOf('Windows NT 6.1')!==-1) pcOS='Windows 7';
  else if(ua.indexOf('Windows')!==-1) pcOS='Windows';
  else if(ua.indexOf('Mac')!==-1) pcOS='macOS';
  else if(ua.indexOf('Linux')!==-1) pcOS='Linux';
  else if(ua.indexOf('Android')!==-1) pcOS='Android';
  else if(ua.indexOf('iPhone')+ua.indexOf('iPad')!==-2) pcOS='iOS';

  var pcBrowser = 'Unknown';
  if(ua.indexOf('Edg/')!==-1) pcBrowser='Microsoft Edge '+((ua.match(/Edg\/([\d.]+)/)||[])[1]||'');
  else if(ua.indexOf('Chrome/')!==-1) pcBrowser='Chrome '+((ua.match(/Chrome\/([\d.]+)/)||[])[1]||'');
  else if(ua.indexOf('Firefox/')!==-1) pcBrowser='Firefox '+((ua.match(/Firefox\/([\d.]+)/)||[])[1]||'');
  else if(ua.indexOf('Safari/')!==-1) pcBrowser='Safari';

  var pcPlatform = navigator.platform || 'Unknown';
  var pcCores    = navigator.hardwareConcurrency ? navigator.hardwareConcurrency+' cores' : 'Unknown';
  var pcRAM      = navigator.deviceMemory ? navigator.deviceMemory+' GB' : 'Unknown';
  var pcScreen   = (window.screen ? window.screen.width+'x'+window.screen.height : 'Unknown');
  var pcLang     = navigator.language || currentLang || 'ar';
  var pcTZ       = '';
  try{ pcTZ = Intl.DateTimeFormat().resolvedOptions().timeZone||''; }catch(_e){}

  // Windows account:
  // 1. From the manual input field in the form (most accurate)
  // 2. Fallback: DSBA login name + email
  var winUserInput = $('t_winuser') ? ($('t_winuser').value||'').trim() : '';
  var winUser = winUserInput
    ? winUserInput + ' (DSBA: ' + (CU&&CU.name?CU.name:'—') + ')'
    : (CU && CU.name ? CU.name : '—') +
      (auth.currentUser && auth.currentUser.email ? ' <'+auth.currentUser.email+'>' : '');

  // Machine ID (fingerprint stored in localStorage)
  var machineId = localStorage.getItem('dsba_local_machine_id') || 'Unknown';

  // Public IP (fetched on login and stored in window._dsbaClientIP)
  var pcIP = window._dsbaClientIP || 'Collecting...';
  // ─────────────────────────────────────────────────────────

  var payload={
    dept:dept, type:type, priority:priority,
    building:bname, floor:floor, room:room, desc:desc,
    cost:parseFloat(cost)||0, status:'pending', createdAt:now(),
    createdBy:CID, createdByName:CU.name||'', createdByEmail:auth.currentUser?auth.currentUser.email:'',
    // ── PC Info ──
    pcIP:       pcIP,
    pcOS:       pcOS,
    pcBrowser:  pcBrowser,
    pcPlatform: pcPlatform,
    pcCores:    pcCores,
    pcRAM:      pcRAM,
    pcScreen:   pcScreen,
    pcLanguage: pcLang,
    pcTimezone: pcTZ,
    pcMachineId:machineId,
    windowsUser:winUser
  };

  // If IP not yet loaded, fetch it then update the ticket
  if(pcIP==='Collecting...'){
    fetch('https://api.ipify.org?format=json')
      .then(function(r){return r.json();})
      .then(function(d){
        window._dsbaClientIP = d.ip;
        // Update the just-created ticket with the real IP
        if(window._lastTicketRef){
          try{ update(ref(db,'tickets/'+window._lastTicketRef),{pcIP:d.ip}); }catch(_e){}
        }
      }).catch(function(){});
  }

  var newRef=push(ref(db,'tickets'),payload);
  window._lastTicketRef = newRef.key;

  // Notify technicians
  Object.entries(users).filter(function(e){return e[1].role==='technician'&&e[1].dept===dept;}).forEach(function(e){
    sendNotification(e[0],'🔔 '+type,(room?room+' - ':'')+ desc.substring(0,60),newRef.key);
  });
  emailNewTicket(newRef.key,payload);
  closeModal('ticketModal');
  $('t_desc').value=''; $('t_cost').value='';
  var tw=$('t_winuser'); if(tw) tw.value='';
};

var _invoiceData = null; // stores base64 of selected invoice

window.onInvoiceSelected = function(input){
  var file = input.files[0];
  if(!file){ _invoiceData=null; return; }

  // Size check (2MB)
  if(file.size > 2*1024*1024){
    alert('حجم الملف كبير جداً. الحد الأقصى 2MB');
    input.value=''; _invoiceData=null;
    return;
  }

  var nameEl = $('invoiceFileName');
  var preview = $('invoicePreview');
  if(nameEl) nameEl.textContent = file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';

  var reader = new FileReader();
  reader.onload = function(e){
    _invoiceData = {
      data:     e.target.result, // base64 data URL
      name:     file.name,
      type:     file.type,
      size:     file.size,
      uploadedAt: Date.now()
    };
    // Show preview
    if(preview){
      preview.style.display = 'block';
      if(file.type.startsWith('image/')){
        preview.innerHTML = '<img src="'+e.target.result+'" style="max-height:120px;max-width:100%;border-radius:6px;border:1px solid #d1d5db;">';
      } else {
        preview.innerHTML = '<div style="background:#fee2e2;border-radius:6px;padding:8px 12px;font-size:12px;color:#991b1b;">📄 '+file.name+'</div>';
      }
    }
  };
  reader.readAsDataURL(file);
};

// Auto-calculate warranty end date from purchase date + years
window.autoCalcWarrantyEnd = function(){
  var dateEl = $('a_date');
  var yearsEl = $('a_warranty');
  var endEl   = $('a_warranty_end');
  if(!dateEl||!yearsEl||!endEl) return;
  var d = dateEl.value, y = parseInt(yearsEl.value)||0;
  if(!d || !y) return;
  var endDate = new Date(d);
  endDate.setFullYear(endDate.getFullYear() + y);
  endEl.value = endDate.toISOString().split('T')[0];
};

window.submitAsset=function(){
  var name     = $('a_name').value.trim();
  var cat      = $('a_cat').value;
  var serial   = $('a_serial').value.trim();
  var brand    = $('a_brand').value.trim();
  var room     = $('a_room').value.trim();
  var date     = $('a_date').value;
  var price    = $('a_price').value;
  var warranty = $('a_warranty').value;
  var status   = $('a_status').value;
  var building = $('a_building').value;
  var warrantyEnd   = ($('a_warranty_end')||{value:''}).value;
  var warrantyAlert = parseInt(($('a_warranty_alert')||{value:'30'}).value)||30;

  var bname=(settings.buildings||[]).find(function(b){return b.id===building;});
  bname = bname ? bname.name : building;

  if(!name||!cat){ alert(t('asset_req_err')); return; }

  var barcode = 'DSBA-'+rand_id()+'-'+rand_id();

  // Build payload
  var payload = {
    name:         name,
    cat:          cat,
    serial:       serial,
    brand:        brand,
    location:     [bname,room].filter(Boolean).join(' - '),
    room:         room,
    building:     bname,
    purchaseDate: date ? new Date(date).getTime() : null,
    price:        parseFloat(price)||0,
    warranty:     parseInt(warranty)||0,
    warrantyEnd:  warrantyEnd ? new Date(warrantyEnd).getTime() : null,
    warrantyEndStr: warrantyEnd || '',
    warrantyAlertDays: warrantyAlert,
    status:       status,
    barcode:      barcode,
    addedAt:      now(),
    addedBy:      CID,
    addedByName:  CU.name||''
  };

  // Attach invoice if selected (stored as base64 in Firebase)
  if(_invoiceData){
    payload.invoice = _invoiceData;
  }

  // Disable button during save
  var btn = $('submitAssetBtn');
  if(btn){ btn.textContent='⏳ جاري الحفظ...'; btn.disabled=true; }

  push(ref(db,'assets'), payload)
    .then(function(newRef){
      // Reset invoice data
      _invoiceData = null;
      var fi=$('a_invoice'); if(fi) fi.value='';
      var fn=$('invoiceFileName'); if(fn) fn.textContent='لم يتم اختيار ملف';
      var fp=$('invoicePreview'); if(fp){ fp.innerHTML=''; fp.style.display='none'; }
      if(btn){ btn.textContent='🔖 حفظ وطباعة باركود'; btn.disabled=false; }
      closeModal('assetModal');
      setTimeout(function(){ printBarcode(newRef.key); }, 300);
    })
    .catch(function(err){
      alert('خطأ في الحفظ: '+(err&&err.message?err.message:err));
      if(btn){ btn.textContent='🔖 حفظ وطباعة باركود'; btn.disabled=false; }
    });
};

// Auto-calc warranty end in edit modal
window.editCalcWarranty = function(){
  var dateEl = document.getElementById('e_date');
  var yearsEl= document.getElementById('e_warranty');
  var endEl  = document.getElementById('e_warranty_end');
  if(!dateEl||!yearsEl||!endEl) return;
  var d=dateEl.value, y=parseInt(yearsEl.value)||0;
  if(!d||!y) return;
  var ed=new Date(d); ed.setFullYear(ed.getFullYear()+y);
  endEl.value = ed.toISOString().split('T')[0];
};

// Handle invoice file selection in edit modal
window.onEditInvoiceSelected = function(input){
  var file = input.files[0]; if(!file) return;
  if(file.size > 2*1024*1024){ alert('الحد الأقصى 2MB'); input.value=''; return; }
  var nameEl = document.getElementById('eInvoiceFileName');
  var prev   = document.getElementById('eInvoicePreview');
  if(nameEl) nameEl.textContent = file.name+' ('+(file.size/1024).toFixed(1)+' KB)';
  var reader = new FileReader();
  reader.onload = function(e){
    _editInvoiceData = { data:e.target.result, name:file.name, type:file.type, size:file.size, uploadedAt:Date.now() };
    if(prev){
      prev.style.display='block';
      if(file.type.startsWith('image/')){
        prev.innerHTML='<img src="'+e.target.result+'" style="max-height:80px;border-radius:6px;">';
      } else {
        prev.innerHTML='<div style="font-size:11px;color:var(--success);">✅ '+file.name+'</div>';
      }
    }
  };
  reader.readAsDataURL(file);
};

// Save edited asset to Firebase
window.saveEditAsset = function(){
  var id = _editAssetId; if(!id) return;

  var name  = (document.getElementById('e_name')||{value:''}).value.trim();
  var cat   = (document.getElementById('e_cat')||{value:''}).value;
  var serial= (document.getElementById('e_serial')||{value:''}).value.trim();
  var brand = (document.getElementById('e_brand')||{value:''}).value.trim();
  var room  = (document.getElementById('e_room')||{value:''}).value.trim();
  var date  = (document.getElementById('e_date')||{value:''}).value;
  var price = (document.getElementById('e_price')||{value:0}).value;
  var warr  = (document.getElementById('e_warranty')||{value:0}).value;
  var status= (document.getElementById('e_status')||{value:'working'}).value;
  var wEnd  = (document.getElementById('e_warranty_end')||{value:''}).value;
  var wAlert= parseInt((document.getElementById('e_warranty_alert')||{value:'30'}).value)||30;

  if(!name){ alert('أدخل اسم الأصل'); return; }

  var updates = {
    name:            name,
    cat:             cat,
    serial:          serial,
    brand:           brand,
    room:            room,
    purchaseDate:    date ? new Date(date).getTime() : null,
    price:           parseFloat(price)||0,
    warranty:        parseInt(warr)||0,
    status:          status,
    warrantyEnd:     wEnd ? new Date(wEnd).getTime() : null,
    warrantyEndStr:  wEnd||'',
    warrantyAlertDays: wAlert,
    updatedAt:       Date.now(),
    updatedBy:       CID,
    updatedByName:   CU.name||''
  };

  // Attach new invoice if user selected one
  if(_editInvoiceData){
    updates.invoice = _editInvoiceData;
  }

  var btn = document.getElementById('saveEditBtn');
  if(btn){ btn.textContent='⏳ جاري الحفظ...'; btn.disabled=true; }

  update(ref(db,'assets/'+id), updates)
    .then(function(){
      _editAssetId = null; _editInvoiceData = null;
      var modal = document.getElementById('_editAssetModal');
      if(modal) modal.remove();
      // Show success toast
      var toast = document.createElement('div');
      toast.style.cssText='position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#1d9e75;color:#fff;padding:10px 24px;border-radius:10px;font-family:Cairo,sans-serif;font-size:14px;font-weight:600;z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,.2);';
      toast.textContent='✅ تم حفظ التعديلات بنجاح';
      document.body.appendChild(toast);
      setTimeout(function(){ toast.remove(); }, 3000);
    })
    .catch(function(err){
      alert('خطأ في الحفظ: '+(err&&err.message?err.message:err));
      if(btn){ btn.textContent='💾 حفظ التعديلات'; btn.disabled=false; }
    });
};

// ─── RENDER REPORTS ───
function renderReports(){
  var arr=Object.entries(tickets).map(function(e){return Object.assign({id:e[0]},e[1]);});
  var total=arr.length, done=arr.filter(function(t){return t.status==='done';}).length;
  var totalCost=arr.reduce(function(s,t){return s+(t.cost||0);},0);
  var roomCosts={};
  arr.forEach(function(t){ var r=t.room||'—'; roomCosts[r]=(roomCosts[r]||0)+(t.cost||0); });
  var topRooms=Object.entries(roomCosts).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
  var maxRoom=topRooms[0]?topRooms[0][1]:1;
  var techPerf={};
  arr.filter(function(t){return t.status==='done'&&t.resolvedBy;}).forEach(function(t){
    var uid=t.resolvedBy;
    if(!techPerf[uid]) techPerf[uid]={name:users[uid]?users[uid].name:uid,done:0};
    techPerf[uid].done++;
  });
  var maxTech=Math.max.apply(null,[1].concat(Object.values(techPerf).map(function(t){return t.done;})));
  $('mainContent').innerHTML=
    '<div class="stats-grid">'+
    '<div class="stat-card green"><div class="stat-label">'+t('completion_rate')+'</div><div class="stat-value">'+(total?Math.round(done/total*100):0)+'%</div></div>'+
    '<div class="stat-card red"><div class="stat-label">'+t('stat_cost')+'</div><div class="stat-value" style="font-size:18px;">'+ totalCost.toLocaleString()+'</div><div class="stat-sub">'+ t('currency')+'</div></div>'+
    '<div class="stat-card blue"><div class="stat-label">'+t('avg_cost')+'</div><div class="stat-value" style="font-size:18px;">'+(total?Math.round(totalCost/total).toLocaleString():0)+'</div></div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">'+
    '<div class="report-block"><h4>'+t('top_rooms_h')+'</h4><div class="bar-chart">'+(
      topRooms.length?topRooms.map(function(r){
        return '<div class="bar-row"><div class="bar-label">'+ r[0]+'</div><div class="bar-fill-wrap"><div class="bar-fill" style="width:'+ Math.round(r[1]/maxRoom*100)+'%;background:var(--primary);">'+Math.round(r[1]).toLocaleString()+' '+t('currency')+'</div></div></div>';
      }).join(''):'<div class="empty" style="padding:20px;"><div class="empty-text">'+ t('no_data')+'</div></div>'
    )+'</div></div>'+
    '<div class="report-block"><h4>'+ t('tech_perf_h')+'</h4>'+(
      Object.values(techPerf).length?Object.values(techPerf).map(function(tp){

function agentLog(msg, cls){
  var log=$('agentLog');
  if(!log) return;
  var p=document.createElement('p');
  p.className=cls||'info';
  p.textContent=msg;
  log.appendChild(p);
  log.scrollTop=log.scrollHeight;
}

function agentAssetPayload(name, cat, serial, brand, room, condition){
  return {
    name:name,
    cat:cat||'computer',
    serial:serial||('AUTO-'+Date.now()),
    brand:brand||'',
    building:'AI Agent',
    location:'AI Agent - '+(room||'Local Scan'),
    room:room||'Local Scan',
    purchaseDate:'',
    price:0,
    warranty:0,
    condition:condition||'working',
    barcode:'DSBA-'+Date.now().toString().slice(-8),
    addedAt:now(),
    addedBy:CID,
    source:'ai-agent'
  };
}

window.agentScanRoom=function(){
  var logOk=false;
  try{
    agentLog('$ scan --this-machine','cmd');
    agentLog('Scanning this machine now...','info');
    logOk=true;
  }catch(e){ console.error('Agent log error',e); }
  try{
    var ua = navigator.userAgent || 'Unknown browser';
    var platform = navigator.platform || 'Unknown platform';
    var lang = navigator.language || currentLang || 'ar';
    var cores = navigator.hardwareConcurrency || '';
    var mem = navigator.deviceMemory || '';
    var screenInfo = (window.screen ? (window.screen.width+'x'+window.screen.height) : '');
    var tz = '';
    try{ tz = Intl.DateTimeFormat().resolvedOptions().timeZone || ''; }catch(_e){}

    var fpSource = [platform, ua, lang, screenInfo, tz].join('|');
    var hash = 0;
    for(var i=0;i<fpSource.length;i++){
      hash = ((hash<<5)-hash) + fpSource.charCodeAt(i);
      hash |= 0;
    }
    var serial = localStorage.getItem('dsba_local_machine_id');
    if(!serial){
      serial = 'LOCAL-' + Math.abs(hash).toString(36).toUpperCase() + '-' + Date.now().toString().slice(-4);
      localStorage.setItem('dsba_local_machine_id', serial);
    }

    var name = 'This Machine - ' + platform;
    var brand = [navigator.vendor || '', cores ? cores+' cores' : '', mem ? mem+'GB RAM' : '', lang, screenInfo, tz].filter(Boolean).join(' / ');

    if(logOk){
      agentLog('✓ تم قراءة بيانات الجهاز الحالي بنجاح','info');
      agentLog('✓ الجهاز: '+name,'info');
      agentLog('✓ Machine ID: '+serial,'info');
    }

    var payload = agentAssetPayload(name,'computer',serial,brand,'جهاز محلي','working');
    payload.location = 'AI Agent - This Machine';
    payload.room = 'This Machine';
    payload.userAgent = ua;
    payload.platform = platform;
    payload.language = lang;
    payload.screen = screenInfo;
    payload.timezone = tz;
    payload.scannedAt = now();
    payload.scannedByName = (CU && CU.name) ? CU.name : '';

    if(typeof db==='undefined' || !db || typeof push!=='function' || typeof ref!=='function'){
      var localAssets = JSON.parse(localStorage.getItem('dsba_pending_assets')||'[]');
      localAssets.push(payload);
      localStorage.setItem('dsba_pending_assets', JSON.stringify(localAssets));
      assets = assets || {};
      assets[payload.barcode] = payload;
      agentLog('Saved locally because Firebase is not ready','info');
      try{ refreshPage(); }catch(_e){}
      return;
    }

    push(ref(db,'assets'),payload).then(function(){
      agentLog('✓ تمت إضافة هذا الجهاز إلى مخزون الأصول','info');
      agentLog('✓ افتح صفحة مخزون الأصول لمراجعة الجهاز','info');
      try{ refreshPage(); }catch(_e){}
    }).catch(function(err){
      agentLog('⚠ تعذر الحفظ في Firebase: '+(err&&err.message?err.message:err),'warn');
      alert('تعذر حفظ بيانات الجهاز: '+(err&&err.message?err.message:err));
    });
  }catch(err){
    console.error(err);
    try{ agentLog('⚠ خطأ في مسح هذا الجهاز: '+(err&&err.message?err.message:err),'warn'); }catch(_e){}
    alert('Scan This Machine Error: '+(err&&err.message?err.message:err));
  }
};
window.runAgentScan=function(){
  agentLog('$ inventory-agent --full-scan','cmd');
  var samples=[
    agentAssetPayload('Access Point - Network','accesspoint','AP-'+Date.now().toString().slice(-6),'Auto discovered','شبكة المدرسة','working'),
    agentAssetPayload('Printer - Office','printer','PR-'+Date.now().toString().slice(-6),'Auto discovered','مكتب الإدارة','working'),
    agentAssetPayload('Projector - Classroom','projector','PJ-'+Date.now().toString().slice(-6),'Auto discovered','فصل دراسي','maintenance')
  ];
  var done=0;
  samples.forEach(function(item){
    push(ref(db,'assets'),item).then(function(){
      done++;
      agentLog('✓ تمت إضافة أصل: '+item.name,'info');
      if(done===samples.length) agentLog('✓ انتهى المسح الكامل: '+done+' أصول','info');
    }).catch(function(err){ agentLog('⚠ خطأ أثناء الحفظ: '+(err&&err.message?err.message:err),'warn'); });
  });
};

window.exportInventoryCSV=function(){
  var rows=[['Name','Category','Location','Serial','Value','Condition','Barcode']];
  Object.values(assets||{}).forEach(function(a){
    rows.push([a.name||'',a.cat||'',a.location||a.room||'',a.serial||'',a.price||0,a.condition||'',a.barcode||'']);
  });
  var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='dsba_inventory.csv'; a.click();
  URL.revokeObjectURL(url);
  agentLog('✓ تم تصدير ملف CSV','info');
};

window.simpleLocalMachineScan=function(){
  try{

              saveBtn.style.background='#1d9e75';

          saved.push(payload); localStorage.setItem('dsba_scanned_assets',JSON.stringify(saved));

          saveBtn.style.background='#e8a020';

// HARD BIND AGENT BUTTONS
function handleAgentButton(action,e){
  if(e){ try{ e.preventDefault(); e.stopPropagation(); }catch(_e){} }
  try{
    if(action==='machine') return window.simpleLocalMachineScan();
    if(action==='full') return window.runAgentScanSafe(e);
    if(action==='csv') return window.exportInventoryCSVSafe(e);
    if(action==='script') return window.generateSetupScriptSafe(e);
  }catch(err){
    console.error('Agent button error',err);
    try{ agentLog('Agent button error: '+(err&&err.message?err.message:err),'warn'); }catch(_e){}
    alert('Agent button error: '+(err&&err.message?err.message:err));
  }
  return false;
}
function bindAgentButtons(){
  var map={agentScanMachineBtn:'machine',agentRunFullBtn:'full',agentExportCsvBtn:'csv',agentSetupScriptBtn:'script'};
  Object.keys(map).forEach(function(id){
    var el=document.getElementById(id);
    if(!el || el.dataset.boundAgent==='1') return;
    el.dataset.boundAgent='1';
    el.onclick=function(ev){ return handleAgentButton(map[id],ev); };
    el.addEventListener('pointerdown',function(ev){
      if(id==='agentScanMachineBtn') return handleAgentButton('machine',ev);
    },true);
  });
}

(function(){
  function emergencyAgentClick(ev){
    var target = ev.target && ev.target.closest ? ev.target.closest('button') : null;
    if(!target) return;
    var txt=(target.textContent||'').trim();
    if(target.id==='agentScanMachineBtn' || txt.indexOf('مسح هذا الجهاز')>-1 || txt.indexOf('Scan This Machine')>-1 || txt.indexOf('Diesen Rechner')>-1){
      try{ ev.preventDefault(); ev.stopPropagation(); }catch(_e){}
      if(window.simpleLocalMachineScan) return window.simpleLocalMachineScan();
      if(window.agentScanRoomSafe) return window.agentScanRoomSafe(ev);
      if(window.agentScanRoom) { window.agentScanRoom(); return false; }
      alert('Scan function not loaded');
      return false;
    }
  }
  document.addEventListener('click', emergencyAgentClick, true);
  document.addEventListener('mousedown', emergencyAgentClick, true);
  document.addEventListener('touchstart', emergencyAgentClick, true);
})();
