<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSBA Maintenance System</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
.header{background:#1a5276;color:#fff;padding:22px}
.container{padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:18px}
input,select,textarea{width:100%;padding:10px;margin:6px 0 12px;border:1px solid #ccc;border-radius:6px}
button{padding:9px 16px;background:#1a5276;color:#fff;border:none;border-radius:6px;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:12px}
td,th{border:1px solid #ddd;padding:10px;text-align:right}
th{background:#1a5276;color:#fff}
.stats{display:flex;gap:14px;flex-wrap:wrap}
.stat{flex:1;min-width:180px;background:#eef5fb;padding:18px;border-radius:12px}
.stat h2{color:#1a5276;margin:8px 0}
.doneText{color:green;font-weight:bold}
.pendingText{color:orange;font-weight:bold}
</style>
</head>

<body>

<div class="header">
  <h2>DSBA - نظام الصيانة</h2>
</div>

<div class="container">

<div class="card" id="loginCard">
  <h3>تسجيل الدخول</h3>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="teacherPanel" style="display:none">
  <div class="card">
    <h3>إنشاء بلاغ</h3>

    <select id="dept">
      <option value="it">IT</option>
      <option value="electricity">كهرباء</option>
    </select>

    <select id="type">
      <option>لمبة</option>
      <option>فيشة</option>
      <option>كمبيوتر</option>
      <option>إنترنت</option>
    </select>

    <input id="room" placeholder="A-101">
    <textarea id="desc" placeholder="وصف المشكلة"></textarea>

    <button onclick="sendTicket()">Send Ticket</button>
  </div>

  <div class="card">
    <h3>تذاكري</h3>
    <div id="teacherTickets"></div>
  </div>
</div>

<div id="adminPanel" style="display:none">

  <div class="card">
    <h2>Admin Dashboard</h2>

    <div class="stats">
      <div class="stat">
        <h3>📊 إجمالي التذاكر</h3>
        <h2 id="totalCount">0</h2>
      </div>

      <div class="stat">
        <h3>🟡 التذاكر المفتوحة</h3>
        <h2 id="pendingCount">0</h2>
      </div>

      <div class="stat">
        <h3>✅ تم الحل</h3>
        <h2 id="doneCount">0</h2>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>📋 كل التذاكر</h3>

    <select id="filterDept" onchange="loadTickets()">
      <option value="">كل الأقسام</option>
      <option value="it">IT</option>
      <option value="electricity">كهرباء</option>
    </select>

    <div id="adminTable"></div>
  </div>

</div>

<div id="techPanel" style="display:none">
  <div class="card">
    <h2>Technician Dashboard</h2>
    <div id="techTable"></div>
  </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUgpm_0w-vbtShNGvHMrnQ-om1cbO8Yuo",
  authDomain: "ticketing-system-2651c.firebaseapp.com",
  databaseURL: "https://ticketing-system-2651c-default-rtdb.firebaseio.com",
  projectId: "ticketing-system-2651c",
  storageBucket: "ticketing-system-2651c.appspot.com",
  messagingSenderId: "625229329187",
  appId: "1:625229329187:web:0d1b8a5e4324f409455296"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;
let currentUid = null;
let ticketsListenerStarted = false;

window.login = function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  signInWithEmailAndPassword(auth,email,pass)
    .then(res=>{
      loadUser(res.user.uid);
    })
    .catch(e=>alert(e.message));
};

function loadUser(uid){
  get(ref(db,"users/"+uid)).then(snap=>{
    const user = snap.val();

    if(!user){
      alert("User not found in DB");
      return;
    }

    currentUser = user;
    currentUid = uid;

    document.getElementById("loginCard").style.display = "none";

    if(user.role === "admin") showAdmin();
    else if(user.role === "technician") showTech();
    else if(user.role === "teacher") showTeacher();
    else alert("Role not recognized");

    startTicketsListener();
  });
}

function hideAll(){
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("techPanel").style.display = "none";
  document.getElementById("teacherPanel").style.display = "none";
}

function showAdmin(){
  hideAll();
  document.getElementById("adminPanel").style.display = "block";
}

function showTech(){
  hideAll();
  document.getElementById("techPanel").style.display = "block";
}

function showTeacher(){
  hideAll();
  document.getElementById("teacherPanel").style.display = "block";
}

window.sendTicket = function(){
  const deptValue = document.getElementById("dept").value;
  const typeValue = document.getElementById("type").value;
  const roomValue = document.getElementById("room").value;
  const descValue = document.getElementById("desc").value;

  if(!roomValue || !descValue){
    alert("من فضلك أدخل الفصل ووصف المشكلة");
    return;
  }

  push(ref(db,"tickets"),{
    dept: deptValue,
    type: typeValue,
    room: roomValue,
    desc: descValue,
    status: "pending",
    createdAt: Date.now(),
    createdBy: currentUid,
    createdByName: currentUser?.name || "",
    createdByEmail: auth.currentUser?.email || ""
  });

  document.getElementById("room").value = "";
  document.getElementById("desc").value = "";

  alert("تم إرسال البلاغ");
};

window.markDone = function(id){
  update(ref(db,"tickets/"+id),{
    status: "done",
    resolvedAt: Date.now()
  });
};

window.loadTickets = function(){
  startTicketsListener(true);
};

function startTicketsListener(forceRenderOnly=false){
  if(ticketsListenerStarted && !forceRenderOnly) return;

  ticketsListenerStarted = true;

  onValue(ref(db,"tickets"), snap=>{
    renderTickets(snap);
  });
}

function renderTickets(snap){
  const filter = document.getElementById("filterDept")?.value || "";

  let total = 0;
  let pending = 0;
  let done = 0;

  let adminHTML = `
    <table>
      <tr>
        <th>الفصل</th>
        <th>القسم</th>
        <th>نوع المشكلة</th>
        <th>الوصف</th>
        <th>الحالة</th>
        <th>إجراء</th>
      </tr>
  `;

  let techHTML = `
    <table>
      <tr>
        <th>الفصل</th>
        <th>القسم</th>
        <th>نوع المشكلة</th>
        <th>الوصف</th>
        <th>الحالة</th>
        <th>إجراء</th>
      </tr>
  `;

  let teacherHTML = `
    <table>
      <tr>
        <th>الفصل</th>
        <th>القسم</th>
        <th>نوع المشكلة</th>
        <th>الوصف</th>
        <th>الحالة</th>
      </tr>
  `;

  snap.forEach(t=>{
    const d = t.val();

    total++;
    if(d.status === "pending") pending++;
    if(d.status === "done") done++;

    if(filter && d.dept !== filter) return;

    const statusText = d.status === "done"
      ? `<span class="doneText">done</span>`
      : `<span class="pendingText">pending</span>`;

    const actionBtn = d.status === "pending"
      ? `<button onclick="markDone('${t.key}')">Done</button>`
      : `تم الحل`;

    adminHTML += `
      <tr>
        <td>${d.room || ""}</td>
        <td>${d.dept || ""}</td>
        <td>${d.type || ""}</td>
        <td>${d.desc || ""}</td>
        <td>${statusText}</td>
        <td>${actionBtn}</td>
      </tr>
    `;

    if(currentUser?.role === "technician" && d.dept === currentUser.dept){
      techHTML += `
        <tr>
          <td>${d.room || ""}</td>
          <td>${d.dept || ""}</td>
          <td>${d.type || ""}</td>
          <td>${d.desc || ""}</td>
          <td>${statusText}</td>
          <td>${actionBtn}</td>
        </tr>
      `;
    }

    if(currentUser?.role === "teacher" && d.createdBy === currentUid){
      teacherHTML += `
        <tr>
          <td>${d.room || ""}</td>
          <td>${d.dept || ""}</td>
          <td>${d.type || ""}</td>
          <td>${d.desc || ""}</td>
          <td>${statusText}</td>
        </tr>
      `;
    }
  });

  adminHTML += "</table>";
  techHTML += "</table>";
  teacherHTML += "</table>";

  document.getElementById("adminTable").innerHTML = adminHTML;
  document.getElementById("techTable").innerHTML = techHTML;
  document.getElementById("teacherTickets").innerHTML = teacherHTML;

  document.getElementById("totalCount").innerText = total;
  document.getElementById("pendingCount").innerText = pending;
  document.getElementById("doneCount").innerText = done;
}

</script>

</body>
</html>
