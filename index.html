<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSBA - Maintenance & Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

:root {
  --primary: #0f2d5c;
  --primary-light: #1a4a8a;
  --accent: #e8a020;
  --accent-light: #f5c256;
  --success: #1d9e75;
  --danger: #d85a30;
  --warning: #ef9f27;
  --bg: #f0f2f7;
  --card: #ffffff;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: rgba(0,0,0,0.08);
  --sidebar-w: 260px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SPLASH / LOGIN ── */
#loginScreen {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f2d5c 0%, #1a4a8a 50%, #0f2d5c 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
#loginScreen::before {
  content:'';
  position:absolute;
  width:600px; height:600px;
  background: radial-gradient(circle, rgba(232,160,32,0.15) 0%, transparent 70%);
  top:-100px; right:-100px;
  pointer-events:none;
}
#loginScreen::after {
  content:'';
  position:absolute;
  width:400px; height:400px;
  background: radial-gradient(circle, rgba(232,160,32,0.1) 0%, transparent 70%);
  bottom:-50px; left:-50px;
  pointer-events:none;
}
.login-box {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 48px;
  width: 420px;
  max-width: 95vw;
  position: relative;
  z-index: 1;
}
.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-logo .logo-circle {
  width: 80px; height: 80px;
  background: var(--accent);
  border-radius: 50%;
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: #fff;
  box-shadow: 0 8px 32px rgba(232,160,32,0.4);
}
.login-logo h1 { color:#fff; font-size:24px; font-weight:700; }
.login-logo p { color:rgba(255,255,255,0.6); font-size:13px; margin-top:4px; }
.login-field { margin-bottom: 18px; }
.login-field label { color: rgba(255,255,255,0.7); font-size:13px; display:block; margin-bottom:6px; }
.login-field input {
  width:100%; padding:12px 16px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  color: #fff; font-family: 'Cairo',sans-serif; font-size:14px;
  outline:none; transition: border-color 0.2s;
}
.login-field input::placeholder { color: rgba(255,255,255,0.35); }
.login-field input:focus { border-color: var(--accent); }
.login-btn {
  width:100%; padding:14px;
  background: var(--accent);
  border:none; border-radius:10px;
  color:#fff; font-family:'Cairo',sans-serif; font-size:15px; font-weight:600;
  cursor:pointer; transition: all 0.2s;
  margin-top: 8px;
}
.login-btn:hover { background: var(--accent-light); transform: translateY(-1px); }
.login-error { color:#f87171; font-size:13px; text-align:center; margin-top:12px; display:none; }

/* ── APP SHELL ── */
#app { display:none; min-height:100vh; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w);
  background: var(--primary);
  position: fixed; top:0; right:0; bottom:0;
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform 0.3s;
}
.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 12px;
}
.sidebar-logo {
  width: 42px; height: 42px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size:15px; font-weight:700; color:#fff; flex-shrink:0;
}
.sidebar-title { color:#fff; font-size:14px; font-weight:700; line-height:1.3; }
.sidebar-subtitle { color:rgba(255,255,255,0.45); font-size:11px; }

.sidebar-user {
  padding: 14px 20px;
  background: rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap:10px;
}
.user-avatar {
  width:34px; height:34px; border-radius:50%;
  background: var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:#fff; flex-shrink:0;
}
.user-info { flex:1; min-width:0; }
.user-name { color:#fff; font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-role { color:rgba(255,255,255,0.45); font-size:10px; }

.sidebar-nav { flex:1; overflow-y:auto; padding: 12px 0; }
.nav-section { padding: 8px 20px 4px; color:rgba(255,255,255,0.3); font-size:10px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px;
  color: rgba(255,255,255,0.6);
  cursor: pointer; transition: all 0.15s;
  border-right: 3px solid transparent;
  font-size: 13px;
}
.nav-item:hover { background:rgba(255,255,255,0.07); color:#fff; }
.nav-item.active { background:rgba(232,160,32,0.15); color:var(--accent); border-right-color: var(--accent); }
.nav-item .nav-icon { font-size:16px; width:20px; text-align:center; }
.nav-badge { margin-right:auto; background:var(--danger); color:#fff; font-size:10px; padding:2px 7px; border-radius:20px; }

.sidebar-footer {
  padding: 14px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.logout-btn {
  display:flex; align-items:center; gap:8px;
  color:rgba(255,255,255,0.4); font-size:12px; cursor:pointer;
  padding:6px 0; transition:color 0.15s;
}
.logout-btn:hover { color:#f87171; }

/* MAIN CONTENT */
.main {
  margin-right: var(--sidebar-w);
  min-height: 100vh;
  display: flex; flex-direction: column;
}
.topbar {
  background:#fff; border-bottom:1px solid var(--border);
  padding: 14px 28px;
  display:flex; align-items:center; gap:16px;
  position:sticky; top:0; z-index:50;
}
.topbar-title { font-size:18px; font-weight:700; color:var(--primary); flex:1; }
.topbar-actions { display:flex; align-items:center; gap:10px; }
.notif-btn {
  position:relative; width:36px; height:36px;
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; transition:background 0.15s;
}
.notif-btn:hover { background:#e5e7eb; }
.notif-badge {
  position:absolute; top:-4px; left:-4px;
  background:var(--danger); color:#fff;
  font-size:9px; padding:1px 5px; border-radius:20px; font-weight:700;
}

.content { padding: 24px 28px; flex:1; }

/* CARDS */
.card {
  background: var(--card); border-radius:14px;
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 20px;
}
.card-title {
  font-size:15px; font-weight:700; color:var(--primary);
  margin-bottom: 16px;
  display:flex; align-items:center; gap:8px;
}
.card-title .icon { font-size:18px; }

/* STAT CARDS */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px; }
.stat-card {
  background:var(--card); border-radius:12px; padding:18px;
  border: 1px solid var(--border);
  position:relative; overflow:hidden;
}
.stat-card::before {
  content:''; position:absolute;
  width:80px; height:80px; border-radius:50%;
  top:-20px; left:-20px;
  opacity:0.08;
}
.stat-card.blue::before { background:var(--primary); }
.stat-card.gold::before { background:var(--accent); }
.stat-card.green::before { background:var(--success); }
.stat-card.red::before { background:var(--danger); }
.stat-label { font-size:11px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.03em; }
.stat-value { font-size:28px; font-weight:700; margin:4px 0 0; color:var(--primary); }
.stat-card.gold .stat-value { color:var(--accent); }
.stat-card.green .stat-value { color:var(--success); }
.stat-card.red .stat-value { color:var(--danger); }
.stat-sub { font-size:11px; color:var(--text-muted); margin-top:4px; }

/* TABLES */
.tbl-wrap { overflow-x:auto; border-radius:10px; border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; min-width:600px; }
thead tr { background:var(--primary); }
th { color:#fff; padding:10px 14px; font-size:12px; font-weight:600; text-align:right; white-space:nowrap; }
td { padding:10px 14px; font-size:13px; border-bottom:1px solid var(--border); color:var(--text); }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover { background:#f8f9ff; }

/* BADGES */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-pending { background:#fff3cd; color:#856404; }
.badge-inprogress { background:#cce5ff; color:#004085; }
.badge-done { background:#d4edda; color:#155724; }
.badge-it { background:#e8eaf6; color:#3949ab; }
.badge-elec { background:#fff8e1; color:#f57f17; }
.badge-civil { background:#fce4ec; color:#c2185b; }

/* FORMS */
.form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group label { font-size:12px; font-weight:600; color:var(--text-muted); }
.form-group input, .form-group select, .form-group textarea {
  padding:9px 12px;
  border:1px solid #d1d5db; border-radius:8px;
  font-family:'Cairo',sans-serif; font-size:13px;
  color:var(--text); background:#fff;
  outline:none; transition:border-color 0.15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--primary-light);
  box-shadow: 0 0 0 3px rgba(26,74,138,0.08);
}
.form-group textarea { min-height:80px; resize:vertical; }
.form-full { grid-column: 1/-1; }

/* BUTTONS */
.btn { padding:9px 18px; border:none; border-radius:8px; font-family:'Cairo',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-light); }
.btn-accent { background:var(--accent); color:#fff; }
.btn-accent:hover { background:var(--accent-light); }
.btn-success { background:var(--success); color:#fff; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-sm { padding:5px 12px; font-size:12px; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text-muted); }
.btn-outline:hover { background:var(--bg); }

/* TABS */
.tabs { display:flex; gap:4px; border-bottom:2px solid var(--border); margin-bottom:20px; }
.tab {
  padding:8px 18px; font-size:13px; font-weight:600; cursor:pointer;
  border-bottom:2px solid transparent; margin-bottom:-2px;
  color:var(--text-muted); transition:all 0.15s;
}
.tab.active { color:var(--primary); border-bottom-color:var(--primary); }

/* NOTIFICATIONS PANEL */
.notif-panel {
  position:fixed; top:60px; left:20px;
  width:320px; background:#fff;
  border-radius:14px; border:1px solid var(--border);
  box-shadow:0 8px 40px rgba(0,0,0,0.12);
  z-index:200; display:none; max-height:400px; overflow-y:auto;
}
.notif-panel.open { display:block; }
.notif-header { padding:14px 16px; font-weight:700; font-size:14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.notif-item { padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
.notif-item:hover { background:var(--bg); }
.notif-item:last-child { border-bottom:none; }
.notif-item.unread { background:#fef9f0; }
.notif-title { font-size:12px; font-weight:600; margin-bottom:2px; }
.notif-msg { font-size:11px; color:var(--text-muted); }
.notif-time { font-size:10px; color:var(--text-muted); margin-top:4px; }

/* MODAL */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.4); z-index:300;
  align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:#fff; border-radius:16px; padding:28px;
  width:560px; max-width:95vw; max-height:85vh; overflow-y:auto;
  position:relative;
}
.modal-title { font-size:17px; font-weight:700; color:var(--primary); margin-bottom:20px; }
.modal-close { position:absolute; top:16px; left:16px; cursor:pointer; font-size:20px; color:var(--text-muted); background:none; border:none; line-height:1; }
.modal-close:hover { color:var(--danger); }
.modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }

/* BARCODE BADGE */
.barcode-badge {
  display:inline-block; padding:4px 10px;
  background:#1a1a2e; color:#fff;
  font-family:monospace; font-size:11px;
  border-radius:6px; letter-spacing:0.08em;
}

/* PROGRESS */
.progress { height:6px; background:#e5e7eb; border-radius:10px; overflow:hidden; }
.progress-bar { height:100%; border-radius:10px; transition:width 0.4s; }

/* PAGES */
.page { display:none; }
.page.active { display:block; }

/* PRIORITY */
.priority-high { color:var(--danger); font-weight:600; }
.priority-med { color:var(--warning); font-weight:600; }
.priority-low { color:var(--success); font-weight:600; }

/* EMPTY STATE */
.empty { text-align:center; padding:40px 20px; color:var(--text-muted); }
.empty-icon { font-size:40px; margin-bottom:12px; }
.empty-text { font-size:14px; }

/* COST TAG */
.cost-tag { background:#eef5fb; color:var(--primary); padding:3px 10px; border-radius:6px; font-size:12px; font-weight:700; }

/* INVENTORY GRID */
.inv-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
.inv-card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:14px; }
.inv-card-img { width:40px; height:40px; background:var(--bg); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:22px; margin-bottom:10px; }
.inv-card-name { font-size:13px; font-weight:700; margin-bottom:4px; }
.inv-card-loc { font-size:11px; color:var(--text-muted); }
.inv-card-status { margin-top:8px; }

/* REPORT SECTION */
.report-block { background:#fff; border-radius:10px; border:1px solid var(--border); padding:16px; margin-bottom:14px; }
.report-block h4 { font-size:13px; font-weight:700; margin-bottom:12px; color:var(--primary); }
.bar-chart { }
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.bar-label { font-size:12px; color:var(--text-muted); min-width:120px; text-align:right; }
.bar-fill-wrap { flex:1; height:20px; background:#f0f2f7; border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-right:8px; font-size:11px; font-weight:600; color:#fff; transition:width 1s; }

/* AGENT PANEL */
.agent-log { background:#0f2d5c; color:#7dff7d; font-family:monospace; font-size:12px; padding:16px; border-radius:10px; height:200px; overflow-y:auto; }
.agent-log p { margin-bottom:4px; }
.agent-log .cmd { color:#f5c256; }
.agent-log .info { color:#7dff7d; }
.agent-log .warn { color:#ff9f43; }

/* SCROLLBAR */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:10px; }

@media (max-width:768px) {
  .sidebar { transform:translateX(100%); }
  .sidebar.open { transform:translateX(0); }
  .main { margin-right:0; }
}

/* ── LANGUAGE SWITCHER ── */
.lang-switcher { display:flex; gap:4px; align-items:center; }
.lang-btn {
  padding:4px 10px; border:1px solid rgba(255,255,255,0.25);
  border-radius:6px; background:transparent; color:rgba(255,255,255,0.55);
  font-size:11px; font-weight:700; cursor:pointer; letter-spacing:.04em;
  transition:all .15s; font-family:'Cairo',sans-serif;
}
.lang-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
.lang-btn.active-lang { background:var(--accent); border-color:var(--accent); color:#fff; }

/* ── LANGUAGE SWITCHER ── */
.lang-switcher{display:flex;gap:4px;align-items:center;}
.lang-btn{padding:4px 10px;border:1px solid rgba(255,255,255,0.25);border-radius:6px;
  background:transparent;color:rgba(255,255,255,0.55);font-size:11px;font-weight:700;
  cursor:pointer;letter-spacing:.04em;transition:all .15s;font-family:'Cairo',sans-serif;}
.lang-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.lang-btn.active-lang{background:var(--accent);border-color:var(--accent);color:#fff;}
</style>
</head>
<body>

<!-- LOGIN SCREEN — rendered by JS -->
<div id="loginScreen"></div>

<!-- APP SHELL -->
<div id="app" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">DS</div>
      <div>
        <div class="sidebar-title">DSBA</div>
        <div class="sidebar-subtitle" id="sidebarSubtitle"></div>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebarAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebarName">—</div>
        <div class="user-role" id="sidebarRole">—</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="logout-btn" id="logoutBtn" onclick="doLogout()">⬅ —</div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle"></div>
      <div class="topbar-actions">
        <div class="lang-switcher" id="langSwitcher"></div>
        <div class="notif-btn" onclick="toggleNotif()" id="notifBtn">
          🔔 <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
        </div>
      </div>
    </div>
    <div class="notif-panel" id="notifPanel">
      <div class="notif-header" id="notifHeader"></div>
      <div id="notifList"></div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<!-- MODALS — rendered by JS -->
<div id="modalsContainer"></div>

<!-- BARCODE PRINT -->
<div id="printArea" style="display:none;padding:20px;"><div id="printContent"></div></div>
<style>@media print{body>*:not(#printArea){display:none!important;}#printArea{display:block!important;}}</style>

  get(ref(db,'settings')).then(function(snap){
    if(snap.val()) Object.assign(settings,snap.val());
    else set(ref(db,'settings'),settings);
  });
}
function saveSettings(){ set(ref(db,'settings'),settings); }

function t(k){ return (L[k]&&L[k][currentLang])||( L[k]&&L[k]['ar'])||k; }

function applyLanguage(lang){
  currentLang = lang;
  localStorage.setItem('dsba_lang', lang);
  var rtl = lang==='ar';
  document.documentElement.lang = lang;
  document.documentElement.dir = rtl ? 'rtl' : 'ltr';
  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.classList.toggle('active-lang', b.dataset.lang===lang);
  });
  // Re-render login or app
  if(document.getElementById('loginScreen').style.display!=='none'||!CU){
    renderLogin();
  } else {
    renderStaticUI();
    refreshPage();
  }
}

function renderLogin(){
  var isRTL = currentLang==='ar';
  document.documentElement.dir = isRTL?'rtl':'ltr';
  document.getElementById('loginScreen').innerHTML = `
    <div class="login-box">
      <div class="login-logo">
        <div class="logo-circle">DS</div>
        <h1>DSBA</h1>
        <p>${t('app_subtitle')}</p>
      </div>
      <div style="display:flex;justify-content:center;gap:6px;margin-bottom:20px;">
        <button class="lang-btn ${currentLang==='ar'?'active-lang':''}" data-lang="ar" onclick="applyLanguage('ar')">عربي</button>
        <button class="lang-btn ${currentLang==='en'?'active-lang':''}" data-lang="en" onclick="applyLanguage('en')">English</button>
        <button class="lang-btn ${currentLang==='de'?'active-lang':''}" data-lang="de" onclick="applyLanguage('de')">Deutsch</button>
      </div>
      <div class="login-field">
        <label>${t('login_email')}</label>
        <input id="loginEmail" type="email" placeholder="user@dsba.edu.eg">
      </div>
      <div class="login-field">
        <label>${t('login_pass')}</label>
        <input id="loginPass" type="password" placeholder="••••••••">
      </div>
      <button class="login-btn" onclick="doLogin()">${t('login_btn')}</button>
      <div class="login-error" id="loginError" style="display:none;">${t('login_error')}</div>
    </div>
  `;
}

function renderStaticUI(){
  // Sidebar subtitle
  var ss=document.getElementById('sidebarSubtitle'); if(ss) ss.textContent=t('system_mgmt');
  // Logout
  var lo=document.getElementById('logoutBtn');
  if(lo) lo.innerHTML=(currentLang==='ar'?'⬅ ':'➡ ')+t('logout');
  // Lang switcher in topbar
  var ls=document.getElementById('langSwitcher');
  if(ls) ls.innerHTML=
    '<button class="lang-btn '+(currentLang==='ar'?'active-lang':'')+'" data-lang="ar" onclick="applyLanguage(\'ar\')">عربي</button>'+
    '<button class="lang-btn '+(currentLang==='en'?'active-lang':'')+'" data-lang="en" onclick="applyLanguage(\'en\')">English</button>'+
    '<button class="lang-btn '+(currentLang==='de'?'active-lang':'')+'" data-lang="de" onclick="applyLanguage(\'de\')">Deutsch</button>';
  // Role
  if(CU){ var ur=document.getElementById('sidebarRole'); if(ur) ur.textContent=role_label(CU.role); }
  // Notifications header
  var nh=document.querySelector('#notifPanel .notif-header');
  if(nh) nh.innerHTML='<span>'+t('notif_title')+'</span><span style="font-size:11px;color:var(--text-muted);cursor:pointer;" onclick="markAllRead()">'+ t('notif_read_all')+'</span>';
  // Rebuild nav
  if(CU) buildNav();
  // Modals
  renderModals();
}

function renderModals(){
  document.getElementById('modalsContainer').innerHTML = buildAllModals();
  // Re-attach overlay close
  document.querySelectorAll('.modal-overlay').forEach(function(ov){
    ov.addEventListener('click',function(e){ if(e.target===ov) ov.classList.remove('open'); });
  });
}

window.calcStoreCost=function(){
  const qty=parseInt($('s_qty')?.value)||1;
  const uc=parseFloat($('s_unit_cost')?.value)||0;
  const total=qty*uc;
  const el=$('s_total_display');
  if(el) el.textContent=total.toLocaleString('ar-EG')+' ج';
};

window.submitStoreIssue=function(){
  const storeId=$('s_store').value, itemId=$('s_item_select').value;
  const ticketId=$('s_ticket').value, location=$('s_location').value;
  const qty=parseInt($('s_qty').value)||1;
  const unitCost=parseFloat($('s_unit_cost').value)||0;
  const totalCost=qty*unitCost;
  const note=$('s_note').value;

  if(!storeId||!itemId){ alert('اختر المخزن والقطعة'); return; }

  get(ref(db,`store_inventory/${storeId}/items/${itemId}`)).then(snap=>{
    const it=snap.val()||{};
    const curBal=it.balance||0;
    if(qty>curBal){ alert(`الرصيد المتاح ${curBal} فقط - لا يمكن صرف ${qty}`); return; }

    // Deduct balance
    update(ref(db,`store_inventory/${storeId}/items/${itemId}`),{
      balance: curBal-qty,
      lastUpdated: Date.now()
    });

    // Record transaction
    push(ref(db,'store_transactions'),{
      storeId, storeName: $('s_store').selectedOptions[0]?.text||storeId,
      itemId, itemName: it.name,
      qty, unitCost, totalCost, location, ticketId, note,
      time: Date.now(), byId:CID, byName:CU.name||''
    });

    // Update ticket cost
    if(ticketId && tickets[ticketId]){
      const oldC=tickets[ticketId].cost||0;
      update(ref(db,'tickets/'+ticketId),{cost:oldC+totalCost});
    }
    closeModal('storeModal');
    alert(`✅ تم صرف ${qty} ${it.unit||'قطعة'} من ${it.name} — الرصيد الجديد: ${curBal-qty}`);
  });
};

window.adjustBalance=function(sid,iid,dir){
  const qty=parseInt($('adj_'+iid)?.value)||1;
  get(ref(db,`store_inventory/${sid}/items/${iid}`)).then(snap=>{
    const it=snap.val()||{};
    const newBal=Math.max(0,(it.balance||0)+(dir*qty));
    update(ref(db,`store_inventory/${sid}/items/${iid}`),{balance:newBal, lastUpdated:Date.now()});
    // Log as addition transaction if adding
    if(dir>0){
      push(ref(db,'store_transactions'),{
        storeId:sid, storeName:it.storeName||sid,
        itemId:iid, itemName:it.name,
        qty, unitCost:it.unit_cost||0, totalCost:(it.unit_cost||0)*qty,
        type:'addition', location:'المخزن', ticketId:'', note:'إضافة رصيد',
        time:Date.now(), byId:CID, byName:CU.name||''

// ─── TICKET STATUS FUNCTIONS ───
function changeTicketStatus(id, status){
  const t=tickets[id]; if(!t) return;
  update(ref(db,'tickets/'+id),{status, updatedAt:Date.now()});
  if(status==='inprogress'){
    sendNotification(t.createdBy,'🔧 بدأ العمل على بلاغك',`الفني بدأ العمل على مشكلة ${t.type||''} في ${t.room||''}`,id);

function resolveTicket(id){
  const note=$('res_note')?.value||'';
  const cost=parseFloat($('res_cost')?.value)||0;
  const t=tickets[id]; if(!t) return;

  update(ref(db,'tickets/'+id),{
    status:'done', resolution:note, cost,
    resolvedAt:Date.now(), resolvedBy:CID, resolvedByName:CU.name||''
  });

  // ── in-app notification ──
  sendNotification(t.createdBy,'✅ تم حل بلاغك',
    'تم حل مشكلة '+(t.type||'')+' في '+(t.room||'')+(note?' — السبب: '+note:''),id);

  // ── EMAIL to ticket creator ──
  emailTicketResolved(id, t, note, cost);

  closeModal('ticketDetailModal');
}

  const t=tickets[id]; if(!t) return;
  update(ref(db,'tickets/'+id),{
    status:'pending',
    reopenedAt:Date.now(), reopenedBy:CID, reopenedByName:CU.name||'',
    reopenReason:reason,
    assignedTo:null, assignedName:null,
    resolution:null, resolvedAt:null
  });
  // notify original technician if was assigned
  if(t.assignedTo){
    sendNotification(t.assignedTo,'🔄 تم إعادة فتح البلاغ',
      `تم إعادة فتح بلاغ ${t.type||''} في ${t.room||''}${reason?' — السبب: '+reason:''}`,id);
  }
  // notify ticket creator
  sendNotification(t.createdBy,'🔄 تم إعادة فتح بلاغك',
    `تم إعادة فتح بلاغك من قِبل الإدارة`,id);

window.transferTicket=function(ticketId, newTechId, newTechName){
  const t=tickets[ticketId]; if(!t) return;
  const oldTechId=t.assignedTo;
  const oldTechName=t.assignedName||'';
  update(ref(db,'tickets/'+ticketId),{
    assignedTo:newTechId, assignedName:newTechName,
    status:'inprogress', transferredAt:Date.now(),
    transferredFrom:oldTechId, transferredFromName:oldTechName,
    transferredBy:CID
  });
  // Notify new technician
  sendNotification(newTechId,'🔄 تم تحويل بلاغ إليك',
    `تم تحويل بلاغ ${t.type||''} في ${t.room||''} من الفني ${oldTechName}`,ticketId);
  // Notify old technician
  if(oldTechId){
    sendNotification(oldTechId,'🔄 تم تحويل بلاغك',
      `تم تحويل بلاغ ${t.type||''} في ${t.room||''} إلى الفني ${newTechName}`,ticketId);
  }
  // Notify ticket creator
  sendNotification(t.createdBy,'👷 تم تغيير الفني المسؤول',
    `الفني ${newTechName} أصبح مسؤولاً عن بلاغك`,ticketId);
  closeModal('assignModal');
  // Reset modal title
  $('assignModal').querySelector('.modal-title').textContent='👷 تعيين فني للبلاغ';
};

  $('tdBody').innerHTML=`

      <div><label style="font-size:11px;color:var(--text-muted);">الموقع</label><div style="margin-top:4px;font-size:13px;">${[t.building,t.floor,t.room].filter(Boolean).join(' / ')||'—'}</div></div>
      <div><label style="font-size:11px;color:var(--text-muted);">الفني المعين</label>
        <div style="margin-top:4px;font-size:13px;display:flex;align-items:center;gap:6px;">
          ${t.assignedName
            ? `<span style="font-weight:600;">${t.assignedName}</span>`
            : `<span style="color:var(--text-muted);">لم يُعيَّن بعد</span>`}
        </div>
      </div>
      <div><label style="font-size:11px;color:var(--text-muted);">مقدم البلاغ</label><div style="margin-top:4px;font-size:13px;">${t.createdByName||'—'}</div></div>

        <div style="margin-top:4px;font-size:13px;background:#f9fafb;padding:10px;border-radius:8px;">${t.desc||'—'}</div>
      </div>
      ${t.resolution?`<div style="grid-column:1/-1;"><label style="font-size:11px;color:var(--text-muted);">ملاحظات الفني / سبب الحل</label>
        <div style="margin-top:4px;font-size:13px;background:#f0fdf4;padding:10px;border-radius:8px;color:var(--success);">${t.resolution}</div>
      </div>`:''}
      ${t.cost?`<div><label style="font-size:11px;color:var(--text-muted);">التكلفة</label><div style="margin-top:4px;"><span class="cost-tag">${parseFloat(t.cost).toLocaleString('ar-EG')} ج</span></div></div>`:''}
    </div>

    ${historyLog?`<div style="background:#f9fafb;border-radius:8px;padding:10px;margin-bottom:14px;"><div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;">📋 سجل الأحداث</div>${historyLog}</div>`:''}

    <div style="border-top:1px solid var(--border);padding-top:14px;">
      <div class="form-group" style="margin-bottom:10px;">
        <label>ملاحظات الفني / سبب الحل</label>
        <textarea id="res_note" placeholder="اكتب تفاصيل ما تم..." style="min-height:80px;width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-family:Cairo,sans-serif;font-size:13px;resize:vertical;"></textarea>

        <input id="res_cost" type="number" placeholder="0" value="${t.cost||0}" style="width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-family:Cairo,sans-serif;font-size:13px;">

  cancelBtn.onclick=()=>closeModal('ticketDetailModal');
  footer.appendChild(cancelBtn);

  // ── Admin buttons ──
  if(isAdmin){
    // Reopen (if done or inprogress)
    if(t.status==='done'||t.status==='inprogress'){
      const reopenBtn=document.createElement('button');
      reopenBtn.className='btn btn-outline';
      reopenBtn.style.cssText='border-color:var(--warning);color:var(--warning);';
      reopenBtn.innerHTML='🔄 إعادة فتح';
      reopenBtn.onclick=()=>reopenTicket(id);
      footer.appendChild(reopenBtn);
    }
    // Transfer (if assigned to someone)
    if(t.assignedTo && t.status!=='done'){
      const transferBtn=document.createElement('button');
      transferBtn.className='btn btn-accent';
      transferBtn.innerHTML='↔️ تحويل لفني آخر';
      transferBtn.onclick=()=>{ closeModal('ticketDetailModal'); openTransferModal(id); };
      footer.appendChild(transferBtn);
    }
    // Assign (if pending and no one assigned)
    if(t.status==='pending'){
      const assignBtn=document.createElement('button');
      assignBtn.className='btn btn-primary';
      assignBtn.innerHTML='👷 تعيين فني';
      assignBtn.onclick=()=>{ closeModal('ticketDetailModal'); openAssignModal(id); };
      footer.appendChild(assignBtn);
    }
  }

  // ── Technician buttons ──
  if(canAct&&t.status==='pending'){
    const startBtn=document.createElement('button');
    startBtn.className='btn btn-primary'; startBtn.textContent='▶ بدء العمل';
    startBtn.onclick=()=>changeTicketStatus(id,'inprogress');
    footer.appendChild(startBtn);
  }
  if(canAct&&t.status==='inprogress'){
    const doneBtn=document.createElement('button');
    doneBtn.className='btn btn-success'; doneBtn.textContent='✅ تم الحل';
    doneBtn.onclick=()=>resolveTicket(id);
    footer.appendChild(doneBtn);
  }

  openModal('ticketDetailModal');
};

// ─── AUTH ───
window.doLogin = function(){
  var e=$('loginEmail').value.trim(), p=$('loginPass').value;
  var errEl=$('loginError');
  if(!e||!p){ if(errEl){errEl.style.display='block'; errEl.textContent=t('login_error');} return; }
  if(errEl) errEl.style.display='none';
  signInWithEmailAndPassword(auth,e,p)
    .then(function(res){ loadCurrentUser(res.user.uid); })
    .catch(function(){ if(errEl){errEl.style.display='block'; errEl.textContent=t('login_error');} });
};

window.doLogout = function(){
  signOut(auth).then(function(){
    CU=null; CID=null;
    document.getElementById('app').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
    renderLogin();
  });
};

function loadCurrentUser(uid){
  get(ref(db,'users/'+uid)).then(function(snap){
    var u=snap.val();
    if(!u){ u={name:'Admin',role:'admin',email:auth.currentUser?.email||''}; set(ref(db,'users/'+uid),u); }
    CU=u; CID=uid;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('sidebarName').textContent=CU.name||CU.email||'—';
    document.getElementById('sidebarAvatar').textContent=(CU.name||'?').charAt(0).toUpperCase();
    renderStaticUI();
    renderModals();
    startListeners();
    showPage('dashboard');
  });
}

function startListeners(){
  onValue(ref(db,'tickets'),function(snap){ tickets=snap.val()||{}; updateBadges(); refreshPage(); });
  onValue(ref(db,'assets'),function(snap){ assets=snap.val()||{}; refreshPage(); });
  onValue(ref(db,'users'),function(snap){ users=snap.val()||{}; refreshPage(); });
  onValue(ref(db,'notifications'),function(snap){
    var all=snap.val()||{};
    notifications=Object.entries(all)
      .filter(function(e){ return e[1].to===CID||e[1].to==='all'; })
      .map(function(e){ return Object.assign({id:e[0]},e[1]); })
      .sort(function(a,b){ return b.time-a.time; });
    renderNotifications();
  });
}

function updateBadges(){
  var unread=notifications.filter(function(n){return !n.read;}).length;
  var badge=$('notifBadge');
  if(badge){ badge.textContent=unread; badge.style.display=unread>0?'':'none'; }
}

function sendNotification(to,title,msg,ticketId){
  push(ref(db,'notifications'),{to:to,title:title,msg:msg,ticketId:ticketId||'',time:Date.now(),read:false});
}

function renderNotifications(){
  updateBadges();
  var list=$('notifList'); if(!list) return;
  list.innerHTML=notifications.length
    ? notifications.slice(0,20).map(function(n){
        return '<div class="notif-item '+(n.read?'':'unread')+'" onclick="readNotif(\\"'+n.id+'\\",\\"'+n.ticketId+'\\")">'+
          '<div class="notif-title">'+(n.title||'')+'</div>'+
          '<div class="notif-msg">'+(n.msg||'')+'</div>'+
          '<div class="notif-time">'+fmt_time(n.time)+'</div></div>';
      }).join('')
    : '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">'+t('notif_empty')+'</div>';
}

window.readNotif=function(id,ticketId){
  update(ref(db,'notifications/'+id),{read:true});
  if(ticketId) showTicketDetail(ticketId);
  toggleNotif();
};
window.markAllRead=function(){ notifications.forEach(function(n){ if(!n.read) update(ref(db,'notifications/'+n.id),{read:true}); }); };

function renderDashboard(){

  var pending=arr.filter(function(t){return t.status==='pending';}).length;
  var inprog=arr.filter(function(t){return t.status==='inprogress';}).length;
  var done=arr.filter(function(t){return t.status==='done';}).length;
  var totalCost=arr.reduce(function(s,t){return s+(parseFloat(t.cost)||0);},0);
  var myTickets=CU.role==='teacher'?arr.filter(function(t){return t.createdBy===CID;}):
    CU.role==='technician'?arr.filter(function(t){return t.dept===CU.dept;}):arr;
  var recent=[].concat(myTickets).sort(function(a,b){return b.createdAt-a.createdAt;}).slice(0,5);

  $('mainContent').innerHTML=
    '<div class="stats-grid">'+
    '<div class="stat-card blue"><div class="stat-label">'+t('stat_total')+'</div><div class="stat-value">'+total+'</div></div>'+
    '<div class="stat-card gold"><div class="stat-label">'+t('stat_pending')+'</div><div class="stat-value">'+pending+'</div></div>'+
    '<div class="stat-card blue"><div class="stat-label">'+t('stat_inprog')+'</div><div class="stat-value">'+inprog+'</div></div>'+
    '<div class="stat-card green"><div class="stat-label">'+t('stat_done')+'</div><div class="stat-value">'+done+'</div></div>'+
    (CU.role==='admin'?'<div class="stat-card red"><div class="stat-label">'+t('stat_cost')+'</div><div class="stat-value" style="font-size:18px;">'+totalCost.toLocaleString()+'</div><div class="stat-sub">'+t('currency')+'</div></div>':'')+
    '</div>'+
    ((CU.role!=='technician')?'<div class="card"><button class="btn btn-primary" onclick="openTicketModal()">'+t('btn_new_ticket')+'</button></div>':'')+
    '<div class="card"><div class="card-title"><span class="icon">🕐</span> '+t('recent_tickets')+'</div>'+
    (recent.length?
      '<div class="tbl-wrap"><table><thead><tr>'+
      ['th_num','th_location','th_dept','th_type','th_priority','th_status','th_date','th_actions'].map(function(k){return'<th>'+t(k)+'</th>';}).join('')+
      '</tr></thead><tbody>'+
      recent.map(function(tk){
        return '<tr><td><code style="font-size:11px;">'+tk.id.substr(0,8)+'</code></td>'+

          '<td><button class="btn btn-sm btn-outline" onclick="showTicketDetail(\''+ tk.id+'\')">'+t('btn_view')+'</button></td></tr>';
      }).join('')+'</tbody></table></div>'

function buildTicketsTable(arr){
  if(!arr.length) return '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">'+t('empty_tickets')+'</div></div>';
  return '<table><thead><tr>'+
    ['th_num','th_location','th_dept','th_type','th_priority','th_status','th_submitter','th_date','th_cost','th_actions'].map(function(k){return'<th>'+t(k)+'</th>';}).join('')+
    '</tr></thead><tbody>'+
    arr.map(function(tk){
      return '<tr><td><code style="font-size:11px;">'+tk.id.substr(0,8)+'</code></td>'+
        '<td style="font-size:12px;">'+ [tk.building,tk.floor,tk.room].filter(Boolean).join(' - ')||'—'+'</td>'+
        '<td>'+dept_badge(tk.dept)+'</td>'+
        '<td style="font-size:12px;">'+( tk.type||'—')+'</td>'+
        '<td>'+priority_span(tk.priority)+'</td>'+
        '<td>'+status_badge(tk.status)+'</td>'+
        '<td style="font-size:12px;">'+( tk.createdByName||'—')+'</td>'+
        '<td style="font-size:12px;">'+fmt_date(tk.createdAt)+'</td>'+
        '<td>'+(tk.cost?'<span class="cost-tag">'+ parseFloat(tk.cost).toLocaleString()+' '+t('currency')+'</span>':'—')+'</td>'+
        '<td style="white-space:nowrap;">'+
        '<button class="btn btn-sm btn-outline" onclick="showTicketDetail(\''+ tk.id+'\')">'+t('btn_details')+'</button>'+
        (CU.role==='admin'&&tk.status==='pending'?'<button class="btn btn-sm btn-accent" style="margin-right:4px;" onclick="openAssignModal(\''+ tk.id+'\')")>👷</button>':'')+
        (CU.role==='admin'?'<button class="btn btn-sm btn-danger" style="margin-right:4px;" onclick="deleteTicket(\''+ tk.id+'\')">🗑</button>':'')+
        '</td></tr>';
    }).join('')+'</tbody></table>';
}

window.filterTickets=function(val,field){
  var arr=Object.entries(tickets).map(function(e){return Object.assign({id:e[0]},e[1]);});
  if(CU.role==='teacher') arr=arr.filter(function(t){return t.createdBy===CID;});
  if(CU.role==='technician') arr=arr.filter(function(t){return t.dept===CU.dept;});
  if(val) arr=arr.filter(function(t){return t[field]===val;});
  arr.sort(function(a,b){return b.createdAt-a.createdAt;});
  var tbl=$('ticketsTable'); if(tbl) tbl.innerHTML=buildTicketsTable(arr);
};

window.openTicketModal=function(){
  openModal('ticketModal');
  var dsel=$('t_dept'); if(!dsel) return;
  dsel.innerHTML='<option value="">'+t('sel_dept')+'</option>';
  (settings.depts||[]).forEach(function(d){ dsel.innerHTML+='<option value="'+d.id+'">'+d.icon+' '+d.name+'</option>'; });
  $('t_type').innerHTML='<option value="">'+t('sel_type')+'</option>';
  $('t_floor').innerHTML='<option value="">'+t('sel_floor')+'</option>';
  $('t_room').innerHTML='<option value="">'+t('sel_room')+'</option>';
  var bsel=$('t_building');
  if(bsel){
    bsel.innerHTML='<option value="">'+t('sel_building')+'</option>';
    (settings.buildings||[]).forEach(function(b){ bsel.innerHTML+='<option value="'+b.id+'">'+b.name+'</option>'; });
    bsel.onchange=function(){ updateFloorRoom('t_building','t_floor','t_room'); };
  }
};

window.updateTypeOptions=function(){
  var dv=$('t_dept').value;
  var tsel=$('t_type'); tsel.innerHTML='<option value="">'+t('sel_type')+'</option>';
  var dept=(settings.depts||[]).find(function(d){return d.id===dv;});
  if(dept) dept.types.forEach(function(tp){ tsel.innerHTML+='<option value="'+tp+'">'+tp+'</option>'; });
};

function updateFloorRoom(bId,fId,rId){
  var bv=$(bId)?$(bId).value:'';
  var bldg=(settings.buildings||[]).find(function(b){return b.id===bv;});
  var fsel=$(fId); var rsel=$(rId);
  if(fsel){ fsel.innerHTML='<option value="">'+t('sel_floor')+'</option>'; if(bldg) bldg.floors.forEach(function(f){fsel.innerHTML+='<option>'+f+'</option>';}); }
  if(rsel){ rsel.innerHTML='<option value="">'+t('sel_room')+'</option>'; if(bldg) bldg.rooms.forEach(function(r){rsel.innerHTML+='<option>'+r+'</option>';}); }
}

window.submitTicket=function(){
  var dept=$('t_dept').value, type=$('t_type').value, priority=$('t_priority').value;
  var building=$('t_building').value, floor=$('t_floor').value, room=$('t_room').value;
  var desc=$('t_desc').value, cost=$('t_cost').value;
  if(!dept||!type||!desc){ alert(t('err_ticket_req')); return; }
  var bname=(settings.buildings||[]).find(function(b){return b.id===building;}); bname=bname?bname.name:building;
  var payload={dept:dept,type:type,priority:priority,building:bname,floor:floor,room:room,desc:desc,
    cost:parseFloat(cost)||0,status:'pending',createdAt:now(),
    createdBy:CID,createdByName:CU.name||'',createdByEmail:auth.currentUser?auth.currentUser.email:''};
  var newRef=push(ref(db,'tickets'),payload);
  Object.entries(users).filter(function(e){return e[1].role==='technician'&&e[1].dept===dept;}).forEach(function(e){
    sendNotification(e[0],'🔔 '+type,(room?room+' - ':'')+ desc.substring(0,60),newRef.key);
  });
  emailNewTicket(newRef.key,payload);
  closeModal('ticketModal');
  $('t_desc').value=''; $('t_cost').value='';
};

// ─── RENDER ASSETS ───
function renderAssets(){
  var arr=Object.entries(assets).map(function(e){return Object.assign({id:e[0]},e[1]);});
  arr.sort(function(a,b){return b.addedAt-a.addedAt;});
  $('mainContent').innerHTML=
    '<div class="card" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;">'+
    (['admin','storekeeper'].includes(CU.role)?'<button class="btn btn-primary" onclick="openModal(\'assetModal\')">'+t('btn_add')+' '+t('lbl_asset_name')+'</button>':'')+
    '<button class="btn btn-accent" onclick="runAgentScan()">'+t('btn_ai_scan')+'</button>'+
    '<input placeholder="'+t('ph_search_asset')+'" style="padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-family:Cairo,sans-serif;font-size:13px;min-width:200px;" oninput="searchAssets(this.value)">'+
    '</div><div class="card"><div class="card-title"><span class="icon">📦</span> '+t('assets_registered')+' ('+arr.length+')</div>'+
    '<div class="tbl-wrap" id="assetsTable">'+buildAssetsTable(arr)+'</div></div>';
  // populate asset building select
  var ab=$('a_building');
  if(ab){ ab.innerHTML='<option value="">'+t('sel_building')+'</option>';
    (settings.buildings||[]).forEach(function(b){ab.innerHTML+='<option value="'+b.id+'">'+b.name+'</option>';});}
}

function buildAssetsTable(arr){
  if(!arr.length) return '<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">'+t('no_assets')+'</div></div>';
  return '<table><thead><tr>'+
    ['th_asset','th_category','th_location','th_serial','th_purchase_date','th_value','th_status','th_barcode','th_actions'].map(function(k){return'<th>'+t(k)+'</th>';}).join('')+
    '</tr></thead><tbody>'+
    arr.map(function(a){
      var cond={working:t('a_working'),maintenance:t('a_maintenance'),broken:t('a_broken'),retired:t('a_retired')};
      var condBadge={working:'badge-done',maintenance:'badge-inprogress',broken:'badge-pending',retired:''};
      return '<tr><td><strong>'+(a.name||'—')+'</strong><br><span style="font-size:11px;color:var(--text-muted);">'+( a.brand||'')+'</span></td>'+
        '<td>'+ asset_icon(a.cat)+' '+(a.cat||'—')+'</td>'+
        '<td style="font-size:12px;">'+(a.location||a.room||'—')+'</td>'+
        '<td><code style="font-size:11px;">'+(a.serial||'—')+'</code></td>'+
        '<td style="font-size:12px;">'+fmt_date(a.purchaseDate||a.addedAt)+'</td>'+
        '<td>'+(a.price?'<span class="cost-tag">'+ parseFloat(a.price).toLocaleString()+' '+t('currency')+'</span>':'—')+'</td>'+
        '<td>'+(a.status?'<span class="badge '+(condBadge[a.status]||'')+'">'+( cond[a.status]||a.status)+'</span>':'—')+'</td>'+
        '<td><span class="barcode-badge">'+(a.barcode||a.id.substr(0,10))+'</span></td>'+
        '<td>'+
        '<button class="btn btn-sm btn-outline" onclick="printBarcode(\''+ a.id+'\')">'+t('btn_barcode')+'</button>'+
        (['admin','storekeeper'].includes(CU.role)?'<button class="btn btn-sm btn-danger" style="margin-right:4px;" onclick="deleteAsset(\''+ a.id+'\')">🗑</button>':'')+
        '</td></tr>';
    }).join('')+'</tbody></table>';
}

window.searchAssets=function(q){
  var arr=Object.entries(assets).map(function(e){return Object.assign({id:e[0]},e[1]);})
    .filter(function(a){return !q||(a.name||'').includes(q)||(a.serial||''). includes(q)||(a.brand||''). includes(q);});
  var tbl=$('assetsTable'); if(tbl) tbl.innerHTML=buildAssetsTable(arr);
};

window.submitAsset=function(){
  var name=$('a_name').value,cat=$('a_cat').value,serial=$('a_serial').value;
  var brand=$('a_brand').value,room=$('a_room').value,date=$('a_date').value;
  var price=$('a_price').value,warranty=$('a_warranty').value,status=$('a_status').value;
  var building=$('a_building').value;
  var bname=(settings.buildings||[]).find(function(b){return b.id===building;}); bname=bname?bname.name:building;
  if(!name||!cat){ alert(t('asset_req_err')); return; }
  var barcode='DSBA-'+rand_id()+'-'+rand_id();
  var newRef=push(ref(db,'assets'),{name:name,cat:cat,serial:serial,brand:brand,
    location:[bname,room].filter(Boolean).join(' - '),room:room,
    purchaseDate:date?new Date(date).getTime():null,price:parseFloat(price)||0,
    warranty:parseInt(warranty)||1,status:status,barcode:barcode,addedAt:now(),addedBy:CID});
  closeModal('assetModal');
  setTimeout(function(){printBarcode(newRef.key);},300);
};

window.deleteAsset=function(id){ if(confirm(t('del_asset_c'))) remove(ref(db,'assets/'+id)); };

window.printBarcode=function(id){
  var a=assets[id]; if(!a) return;
  var bc=a.barcode||id;
  var bars=bc.split('').map(function(c){
    var code=c.charCodeAt(0);
    return '<div style="display:inline-block;width:'+(2+(code%3))+'px;height:60px;background:'+(code%2===0?'#000':'#fff')+';margin:0;"></div>';
  }).join('');
  $('printContent').innerHTML='<div style="text-align:center;font-family:monospace;border:2px solid #000;padding:20px;display:inline-block;min-width:300px;">'+
    '<div style="font-size:14px;font-weight:bold;margin-bottom:4px;">DSBA SCHOOL</div>'+
    '<div style="font-size:12px;margin-bottom:10px;">'+(a.name||'')+'</div>'+
    '<div style="line-height:0;margin-bottom:8px;">'+bars+'</div>'+
    '<div style="font-size:14px;font-weight:bold;letter-spacing:.15em;">'+ bc+'</div>'+
    '<div style="font-size:10px;color:#666;margin-top:4px;">'+(a.cat||'')+' | '+(a.location||'')+'</div>'+
    '<div style="font-size:10px;color:#666;">'+fmt_date(a.purchaseDate||a.addedAt)+'</div></div>';
  $('printArea').style.display='block';
  window.print();
  setTimeout(function(){$('printArea').style.display='none';},1000);
};

// ─── RENDER USERS ───
function renderUsers(){
  if(CU.role!=='admin'){ $('mainContent').innerHTML='<div class="empty"><div class="empty-icon">🔒</div><div class="empty-text">'+ t('not_auth')+'</div></div>'; return; }
  var arr=Object.entries(users).map(function(e){return Object.assign({id:e[0]},e[1]);});
  $('mainContent').innerHTML=
    '<div class="card" style="margin-bottom:16px;"><button class="btn btn-primary" onclick="openModal(\'userModal\')">'+t('btn_add_user')+'</button></div>'+
    '<div class="card"><div class="card-title"><span class="icon">👥</span> '+t('users_list_h')+' ('+arr.length+')</div>'+
    '<div class="tbl-wrap"><table><thead><tr>'+
    ['th_num','lbl_full_name','lbl_email','th_role','th_dept','th_phone','th_actions'].map(function(k){return'<th>'+t(k)+'</th>';}).join('')+
    '</tr></thead><tbody>'+
    arr.map(function(u,i){
      return '<tr><td>'+(i+1)+'</td><td><strong>'+(u.name||'—')+'</strong></td>'+
        '<td style="font-size:12px;">'+(u.email||'—')+'</td>'+
        '<td><span class="badge badge-inprogress">'+ role_label(u.role)+'</span></td>'+
        '<td>'+(u.dept?dept_badge(u.dept):'—')+'</td>'+
        '<td style="font-size:12px;">'+(u.phone||'—')+'</td>'+
        '<td>'+(u.id!==CID?'<button class="btn btn-sm btn-danger" onclick="deleteUser(\''+ u.id+'\')">🗑</button>':'<span class="badge badge-done">'+ t('you_label')+'</span>')+'</td></tr>';
    }).join('')+'</tbody></table></div></div>';
}

window.submitUser=function(){
  var name=$('u_name').value,email=$('u_email').value,pass=$('u_pass').value;
  var role=$('u_role').value,dept=$('u_dept').value,phone=$('u_phone').value;
  if(!name||!email||!pass){ alert(t('err_user_req')); return; }
  createUserWithEmailAndPassword(auth,email,pass)
    .then(function(res){
      set(ref(db,'users/'+res.user.uid),{name:name,email:email,role:role,dept:dept,phone:phone});
      closeModal('userModal');
    }).catch(function(e){ alert(t('u_error'||'Error')+': '+e.message); });
};
window.deleteUser=function(id){ if(confirm(t('del_user_c'))) remove(ref(db,'users/'+id)); };

// ─── RENDER REPORTS ───
function renderReports(){
  var arr=Object.entries(tickets).map(function(e){return Object.assign({id:e[0]},e[1]);});
  var total=arr.length, done=arr.filter(function(t){return t.status==='done';}).length;
  var totalCost=arr.reduce(function(s,t){return s+(t.cost||0);},0);
  var roomCosts={};
  arr.forEach(function(t){ var r=t.room||'—'; roomCosts[r]=(roomCosts[r]||0)+(t.cost||0); });
  var topRooms=Object.entries(roomCosts).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
  var maxRoom=topRooms[0]?topRooms[0][1]:1;
  var techPerf={};
  arr.filter(function(t){return t.status==='done'&&t.resolvedBy;}).forEach(function(t){
    var uid=t.resolvedBy;
    if(!techPerf[uid]) techPerf[uid]={name:users[uid]?users[uid].name:uid,done:0};
    techPerf[uid].done++;
  });
  var maxTech=Math.max.apply(null,[1].concat(Object.values(techPerf).map(function(t){return t.done;})));
  $('mainContent').innerHTML=
    '<div class="stats-grid">'+
    '<div class="stat-card green"><div class="stat-label">'+t('completion_rate')+'</div><div class="stat-value">'+(total?Math.round(done/total*100):0)+'%</div></div>'+
    '<div class="stat-card red"><div class="stat-label">'+t('stat_cost')+'</div><div class="stat-value" style="font-size:18px;">'+ totalCost.toLocaleString()+'</div><div class="stat-sub">'+ t('currency')+'</div></div>'+
    '<div class="stat-card blue"><div class="stat-label">'+t('avg_cost')+'</div><div class="stat-value" style="font-size:18px;">'+(total?Math.round(totalCost/total).toLocaleString():0)+'</div></div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">'+
    '<div class="report-block"><h4>'+t('top_rooms_h')+'</h4><div class="bar-chart">'+(
      topRooms.length?topRooms.map(function(r){
        return '<div class="bar-row"><div class="bar-label">'+ r[0]+'</div><div class="bar-fill-wrap"><div class="bar-fill" style="width:'+ Math.round(r[1]/maxRoom*100)+'%;background:var(--primary);">'+Math.round(r[1]).toLocaleString()+' '+t('currency')+'</div></div></div>';
      }).join(''):'<div class="empty" style="padding:20px;"><div class="empty-text">'+ t('no_data')+'</div></div>'
    )+'</div></div>'+
    '<div class="report-block"><h4>'+ t('tech_perf_h')+'</h4>'+(
      Object.values(techPerf).length?Object.values(techPerf).map(function(tp){
        return '<div class="bar-row"><div class="bar-label">'+tp.name+'</div><div class="bar-fill-wrap"><div class="bar-fill" style="width:'+Math.round(tp.done/maxTech*100)+'%;background:var(--success);">'+tp.done+' '+t('tickets_lbl')+'</div></div></div>';
      }).join(''):'<div class="empty" style="padding:20px;"><div class="empty-text">'+ t('no_data')+'</div></div>'
    )+'</div></div>'+
    '<div class="report-block"><h4>'+ t('dept_dist_h')+'</h4><div style="display:flex;gap:14px;flex-wrap:wrap;">'+(
      (settings.depts||[]).map(function(d){
        var count=arr.filter(function(tk){return tk.dept===d.id;}).length;
        var costS=arr.filter(function(tk){return tk.dept===d.id;}).reduce(function(s,tk){return s+(tk.cost||0);},0);
        return '<div class="stat-card blue" style="min-width:150px;"><div class="stat-label">'+d.icon+' '+d.name+'</div><div class="stat-value" style="font-size:22px;">'+ count+'</div><div class="stat-sub">'+ costS.toLocaleString()+' '+t('currency')+'</div></div>';
      }).join('')
    )+'</div></div>';
}

    '<button class="btn btn-accent" onclick="generateSetupScript()">'+ t('btn_gen_script')+'</button>'+

// Render login on page load — called last after all defs
renderLogin();

document.addEventListener('click',function(e){
  var panel=$('notifPanel'),btn=$('notifBtn');
  if(panel&&btn&&!panel.contains(e.target)&&!btn.contains(e.target)) panel.classList.remove('open');
