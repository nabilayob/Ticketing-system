// Firebase path: /timesheet/{uid}/{entryId}
// Entry: { date, taskName, startTime, endTime, notes, createdAt, uid, userName }

function renderTimesheet(){
  var isAdmin = isSuperAdmin() || isDeptAdmin();

  $('mainContent').innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;">'+
      '<div>'+
        '<h2 style="font-size:18px;font-weight:700;color:var(--primary);margin:0;">📅 كشف الحضور والأعمال</h2>'+
        '<div style="font-size:12px;color:var(--text-muted);margin-top:3px;">'+
          (isAdmin?'عرض وطباعة كشف جميع الفنيين':'سجّل مهامك اليومية واطبع كشف عملك')+'</div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap;">'+
        (!isAdmin?'<button class="btn btn-primary" onclick="openAddTaskModal()">➕ إضافة مهمة</button>':'')+
        '<button class="btn btn-outline" id="tsPrintBtn" onclick="printTimesheet()">🖨 طباعة الكشف</button>'+
      '</div>'+
    '</div>'+

    // Filter bar
    '<div class="card" style="padding:12px 16px;margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">'+
      '<div style="display:flex;align-items:center;gap:6px;">'+
        '<label style="font-size:12px;font-weight:600;color:var(--text-muted);">من:</label>'+
        '<input type="date" id="ts_from" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:7px;font-family:Cairo,sans-serif;font-size:12px;" onchange="loadTimesheetData()">'+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:6px;">'+
        '<label style="font-size:12px;font-weight:600;color:var(--text-muted);">إلى:</label>'+
        '<input type="date" id="ts_to" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:7px;font-family:Cairo,sans-serif;font-size:12px;" onchange="loadTimesheetData()">'+
      '</div>'+
      (isAdmin?
        '<div style="display:flex;align-items:center;gap:6px;">'+
          '<label style="font-size:12px;font-weight:600;color:var(--text-muted);">الفني:</label>'+
          '<select id="ts_tech" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:7px;font-family:Cairo,sans-serif;font-size:12px;" onchange="loadTimesheetData()">'+
            '<option value="">كل الفنيين</option>'+
            Object.entries(users).filter(function(e){
              if(e[1].role!=='technician') return false;
              if(isDeptAdmin()) return canManageDept(e[1].dept);
              return true;
            }).map(function(e){return '<option value="'+e[0]+'">'+e[1].name+'</option>';}).join('')+
          '</select>'+
        '</div>':'')+
      '<button class="btn btn-outline btn-sm" onclick="setTsToday()">اليوم</button>'+
      '<button class="btn btn-outline btn-sm" onclick="setTsThisMonth()">هذا الشهر</button>'+
    '</div>'+

    // Stats row
    '<div id="tsStats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;"></div>'+

    // Table area
    '<div id="tsContent"><div class="empty"><div class="empty-icon">📅</div><div class="empty-text">اختر نطاق تاريخ لعرض البيانات</div></div></div>';

  // Set default dates = today
  var today = new Date().toISOString().split('T')[0];
  $('ts_from').value = today;
  $('ts_to').value   = today;

  loadTimesheetData();
}

// ─── Set date shortcuts ─────────────────────────────────────
window.setTsToday = function(){
  var today = new Date().toISOString().split('T')[0];
  $('ts_from').value = today; $('ts_to').value = today;
  loadTimesheetData();
};
window.setTsThisMonth = function(){
  var now = new Date();
  var first = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
  var last  = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().split('T')[0];
  $('ts_from').value = first; $('ts_to').value = last;
  loadTimesheetData();
};

// ─── Load data from Firebase ────────────────────────────────
function loadTimesheetData(){
  var fromEl=$('ts_from'), toEl=$('ts_to');
  if(!fromEl||!toEl) return;
  var fromDate = fromEl.value || new Date().toISOString().split('T')[0];
  var toDate   = toEl.value   || fromDate;
  var isAdmin  = CU.role==='admin';
  var techFilter = isAdmin && $('ts_tech') ? $('ts_tech').value : '';

  var content=$('tsContent');
  if(content) content.innerHTML='<div class="loading" style="padding:30px;text-align:center;color:var(--text-muted);">⏳ جاري تحميل البيانات...</div>';

  // Which users to load
  var uidsToLoad = [];
  if(!isAdmin && !isDeptAdmin()){
    uidsToLoad = [CID];
  } else if(techFilter){
    uidsToLoad = [techFilter];
  } else {
    uidsToLoad = Object.entries(users)
      .filter(function(e){
        if(e[1].role !== 'technician') return false;
        if(isDeptAdmin()) return canManageDept(e[1].dept); // only their depts
        return true; // superadmin sees all
      })
      .map(function(e){ return e[0]; });
    if(!uidsToLoad.length){ renderTimesheetTable({}); return; }
  }

  var allEntries = {};
  var pending = uidsToLoad.length;

  uidsToLoad.forEach(function(uid){
    get(ref(db,'timesheet/'+uid)).then(function(snap){
      var data = snap.val()||{};
      // Filter by date range
      Object.entries(data).forEach(function(e){
        var entry = e[1];
        if(entry.date >= fromDate && entry.date <= toDate){
          if(!allEntries[uid]) allEntries[uid] = [];
          allEntries[uid].push(Object.assign({id:e[0]}, entry));
        }
      });
      pending--;
      if(pending===0) renderTimesheetTable(allEntries);
    }).catch(function(){
      pending--;
      if(pending===0) renderTimesheetTable(allEntries);
    });
  });
}

// ─── Render the timesheet table ─────────────────────────────
function renderTimesheetTable(allEntries){
  var isAdmin = CU.role==='admin';
  var statsEl = $('tsStats'), content = $('tsContent');
  if(!content) return;

  // Calculate totals
  var grandTotalMs = 0, grandTasks = 0;
  Object.values(allEntries).forEach(function(arr){
    arr.forEach(function(e){ grandTotalMs += calcDuration(e.startTime,e.endTime); grandTasks++; });
  });

  // Stats cards
  if(statsEl){
    statsEl.innerHTML=
      '<div class="stat-card blue"><div class="stat-label">إجمالي المهام</div><div class="stat-value">'+grandTasks+'</div></div>'+
      '<div class="stat-card green"><div class="stat-label">إجمالي الوقت</div><div class="stat-value" style="font-size:18px;">'+fmtDur(grandTotalMs)+'</div></div>'+
      '<div class="stat-card gold"><div class="stat-label">عدد الفنيين</div><div class="stat-value">'+Object.keys(allEntries).length+'</div></div>';
  }

  if(!grandTasks){
    content.innerHTML='<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">لا توجد مهام في هذه الفترة</div></div>';
    return;
  }

  var html='<div id="tsPrintable">';

  // Print header (hidden on screen, shown on print)
  html+='<div class="ts-print-header" style="display:none;">'+
    '<div style="text-align:center;margin-bottom:16px;">'+
      '<div style="font-size:20px;font-weight:700;">مدرسة DSBA — كشف الحضور والأعمال</div>'+
      '<div style="font-size:13px;color:#666;margin-top:4px;">'+
        'الفترة: '+($('ts_from')?$('ts_from').value:'')+'  →  '+($('ts_to')?$('ts_to').value:'')+
      '</div>'+
      '<div style="font-size:12px;color:#999;margin-top:2px;">تاريخ الطباعة: '+new Date().toLocaleString('ar-EG')+'</div>'+
    '</div>'+
    '<div style="display:flex;gap:20px;justify-content:center;margin-bottom:16px;">'+
      '<div style="background:#f0f4f8;border-radius:6px;padding:8px 16px;font-size:13px;">إجمالي المهام: <strong>'+grandTasks+'</strong></div>'+
      '<div style="background:#f0f4f8;border-radius:6px;padding:8px 16px;font-size:13px;">إجمالي الوقت: <strong>'+fmtDur(grandTotalMs)+'</strong></div>'+
    '</div>'+
  '</div>';

  // Per-technician section
  Object.entries(allEntries).forEach(function(ue){
    var uid = ue[0];
    var entries = ue[1];
    var uName = (users[uid]&&users[uid].name)||uid;
    var uDept = (users[uid]&&users[uid].dept)||'';

    // Sort by date then startTime
    entries.sort(function(a,b){
      if(a.date!==b.date) return a.date.localeCompare(b.date);
      return (a.startTime||'').localeCompare(b.startTime||'');
    });

    // Group by date
    var byDate={};
    entries.forEach(function(e){
      if(!byDate[e.date]) byDate[e.date]=[];
      byDate[e.date].push(e);
    });

    var techTotal = entries.reduce(function(s,e){return s+calcDuration(e.startTime,e.endTime);},0);

    html+='<div class="card ts-tech-block" style="margin-bottom:20px;">';

    // Tech header
    html+='<div style="display:flex;justify-content:space-between;align-items:center;'+
      'margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--primary);">'+
      '<div style="display:flex;align-items:center;gap:12px;">'+
        '<div style="width:42px;height:42px;background:var(--primary);border-radius:50%;'+
          'display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;">'+
          uName.charAt(0)+
        '</div>'+
        '<div>'+
          '<div style="font-size:15px;font-weight:700;color:var(--primary);">'+uName+'</div>'+
          '<div style="font-size:11px;color:var(--text-muted);">'+uDept+'</div>'+
        '</div>'+
      '</div>'+
      '<div style="text-align:left;">'+
        '<div style="font-size:12px;color:var(--text-muted);">'+entries.length+' مهمة</div>'+
        '<div style="font-size:14px;font-weight:700;color:var(--success);">⏱ '+fmtDur(techTotal)+'</div>'+
      '</div>'+
    '</div>';

    // Per-date sections
    Object.entries(byDate).forEach(function(de){
      var date = de[0];
      var dayEntries = de[1];
      var dayTotal = dayEntries.reduce(function(s,e){return s+calcDuration(e.startTime,e.endTime);},0);
      var dayLabel = new Date(date+'T12:00:00').toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

      html+='<div style="margin-bottom:14px;">'+
        '<div style="background:#f0f4f8;border-radius:6px;padding:6px 12px;'+
          'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'+
          '<div style="font-size:12px;font-weight:700;color:var(--primary);">📆 '+dayLabel+'</div>'+
          '<div style="font-size:12px;font-weight:600;color:var(--success);">مجموع اليوم: '+fmtDur(dayTotal)+'</div>'+
        '</div>';

      // Tasks table for this day
      html+='<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;">'+
        '<thead><tr style="background:var(--primary);color:#fff;">'+
          '<th style="padding:7px 10px;text-align:right;border-radius:4px 0 0 0;">اسم المهمة</th>'+
          '<th style="padding:7px 10px;text-align:center;">وقت البدء</th>'+
          '<th style="padding:7px 10px;text-align:center;">وقت الانتهاء</th>'+
          '<th style="padding:7px 10px;text-align:center;">المدة</th>'+
          '<th style="padding:7px 10px;text-align:right;">ملاحظات</th>'+
          (!isAdmin?'<th style="padding:7px 10px;text-align:center;border-radius:0 4px 0 0;">إجراء</th>':'')+
        '</tr></thead><tbody>';

      dayEntries.forEach(function(e, idx2){
        var dur = calcDuration(e.startTime, e.endTime);
        var durStr = dur>0?fmtDur(dur):(e.endTime?'—':'⏳ جارية');
        var rowBg = idx2%2===0?'#fff':'#f9fafb';
        html+='<tr style="background:'+rowBg+';">'+
          '<td style="padding:8px 10px;font-weight:600;">'+htmlEsc(e.taskName||'—')+'</td>'+
          '<td style="padding:8px 10px;text-align:center;direction:ltr;">'+htmlEsc(e.startTime||'—')+'</td>'+
          '<td style="padding:8px 10px;text-align:center;direction:ltr;">'+(e.endTime?htmlEsc(e.endTime):'<span style="color:var(--warning);">لم تنته</span>')+'</td>'+
          '<td style="padding:8px 10px;text-align:center;font-weight:700;color:'+(dur>0?'var(--success)':'var(--text-muted)')+';">'+durStr+'</td>'+
          '<td style="padding:8px 10px;color:var(--text-muted);font-size:11px;">'+htmlEsc(e.notes||'—')+'</td>'+
          (!isAdmin?
            '<td style="padding:8px 10px;text-align:center;white-space:nowrap;">'+
              // Show ticket badge for auto-added entries
              (e.autoAdded?'<div style="font-size:10px;background:#eef5fb;color:var(--primary);border-radius:4px;padding:2px 6px;margin-bottom:3px;display:inline-block;">🎫 بلاغ تلقائي</div><br>':'')+
              // Show end button or done status
              (!e.endTime
                ?'<button class="btn btn-sm btn-success" onclick="endTask(\''+uid+'\',\''+e.id+'\')">⏱ تسجيل الانتهاء</button> '
                :'<span style="font-size:11px;color:var(--success);font-weight:600;">✅ '+e.endTime+'</span> ')+
              // Only allow delete for manually-added entries
              (!e.autoAdded?'<button class="btn btn-sm btn-danger" onclick="deleteTask(\''+uid+'\',\''+e.id+'\')">🗑</button>':'')+
            '</td>':'')+
        '</tr>';
      });

      html+='</tbody></table></div></div>';
    });

    // Tech total footer
    html+='<div style="background:#f0fdf4;border-radius:6px;padding:8px 14px;'+
      'display:flex;justify-content:flex-end;gap:20px;font-size:13px;font-weight:700;">'+
      '<span>إجمالي مهام '+uName+': '+entries.length+' مهمة</span>'+
      '<span style="color:var(--success);">⏱ إجمالي الوقت: '+fmtDur(techTotal)+'</span>'+
    '</div>';

    html+='</div>'; // end card
  });

  html+='</div>'; // end tsPrintable
  content.innerHTML = html;
}

// ─── Helpers ────────────────────────────────────────────────
function calcDuration(startTime, endTime){
  if(!startTime||!endTime) return 0;
  try{
    var s=startTime.split(':'), e=endTime.split(':');
    var sm=parseInt(s[0])*60+parseInt(s[1]);
    var em=parseInt(e[0])*60+parseInt(e[1]);
    var diff=(em-sm)*60000;
    return diff>0?diff:0;
  }catch(_e){ return 0; }
}
function fmtDur(ms){
  if(!ms||ms<=0) return '—';
  var totalMin=Math.round(ms/60000);
  var h=Math.floor(totalMin/60), m=totalMin%60;
  if(h>0&&m>0) return h+'س '+m+'د';
  if(h>0) return h+' ساعة';
  return m+' دقيقة';
}
function htmlEsc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Save Task ──────────────────────────────────────────────
window.saveTask = function(){
  var taskName = ($('ts_task')||{value:''}).value.trim();
  var date     = ($('ts_date')||{value:''}).value;
  var startTime= ($('ts_start')||{value:''}).value;
  var endTime  = ($('ts_end')||{value:''}).value;
  var notes    = ($('ts_notes')||{value:''}).value.trim();

  if(!taskName){ alert('من فضلك أدخل اسم المهمة'); return; }
  if(!date)    { alert('من فضلك اختر التاريخ'); return; }
  if(!startTime){ alert('من فضلك أدخل وقت البدء'); return; }

  // Validate end > start
  if(endTime && endTime <= startTime){
    alert('وقت الانتهاء يجب أن يكون بعد وقت البدء'); return;
  }

  var entry={
    taskName:  taskName,
    date:      date,
    startTime: startTime,
    endTime:   endTime||'',
    notes:     notes,
    uid:       CID,
    userName:  CU.name||'',
    userDept:  CU.dept||'',
    createdAt: Date.now()
  };

  var btn=document.querySelector('#_tsModal button.btn-primary');
  if(btn){ btn.textContent='⏳ جاري الحفظ...'; btn.disabled=true; }

  push(ref(db,'timesheet/'+CID), entry)
    .then(function(){
      var modal=document.getElementById('_tsModal');
      if(modal) modal.remove();
      // Refresh timesheet
      loadTimesheetData();
    })
    .catch(function(err){
      alert('خطأ في الحفظ: '+(err&&err.message?err.message:err));
      if(btn){ btn.textContent='💾 حفظ المهمة'; btn.disabled=false; }
    });
};

window.confirmEndTask = function(uid, entryId){
  var inp = document.getElementById('_endTimeInput');
  var endTime = inp ? inp.value : new Date().toTimeString().substr(0,5);

  // Validate: get start time to compare
  get(ref(db,'timesheet/'+uid+'/'+entryId)).then(function(snap){
    var entry = snap.val()||{};
    if(entry.startTime && endTime <= entry.startTime){
      alert('وقت الانتهاء يجب أن يكون بعد وقت البدء ('+entry.startTime+')');
      return;
    }
    update(ref(db,'timesheet/'+uid+'/'+entryId), {endTime: endTime})
      .then(function(){
        var pop = document.getElementById('_endTaskPopup');
        if(pop) pop.remove();
        loadTimesheetData();
      })
      .catch(function(err){ alert('خطأ: '+(err&&err.message?err.message:err)); });
  }).catch(function(){
    // Fallback: save without validation
    update(ref(db,'timesheet/'+uid+'/'+entryId), {endTime: endTime})
      .then(function(){
        var pop = document.getElementById('_endTaskPopup');
        if(pop) pop.remove();
        loadTimesheetData();
      });
  });
};

window.deleteTask = function(uid, entryId){

    .then(function(){ loadTimesheetData(); })
    .catch(function(err){ alert('خطأ: '+(err&&err.message?err.message:err)); });
};

// ─── Print Timesheet ────────────────────────────────────────
window.printTimesheet = function(){
  // ── Check data exists ─────────────────────────────────────
  var tsContent = document.getElementById('tsContent');
  var tsPrintable = document.getElementById('tsPrintable');

  // Determine if there's real data (not just empty state)
  var hasData = false;
  if(tsPrintable){
    // tsPrintable exists means renderTimesheetTable ran with data
    hasData = tsPrintable.querySelector('table') !== null ||
              tsPrintable.querySelector('.ts-tech-block') !== null;
  } else if(tsContent){
    hasData = tsContent.querySelector('table') !== null ||
              tsContent.querySelector('.ts-tech-block') !== null;
  }

  if(!hasData){
    alert('لا توجد بيانات للطباعة.\nتأكد من:\n1. اختيار نطاق تاريخ صحيح\n2. وجود مهام مسجلة في هذه الفترة');
    return;
  }

  // ── Collect stats safely ──────────────────────────────────
  var fromVal = $('ts_from') ? $('ts_from').value : '';
  var toVal   = $('ts_to')   ? $('ts_to').value   : '';
  var statsEl = $('tsStats');

  // Build stats HTML from live DOM
  var statsRows = '';
  if(statsEl && statsEl.children.length){
    var cards = statsEl.querySelectorAll('.stat-card');
    cards.forEach(function(card){
      var lbl = card.querySelector('.stat-label');
      var val = card.querySelector('.stat-value');
      if(lbl && val){
        statsRows +=
          '<div style="background:#f0f4f8;border-radius:6px;padding:10px 18px;'+
          'text-align:center;min-width:120px;border-top:3px solid #0f2d5c;">'+
          '<div style="font-size:11px;color:#666;margin-bottom:4px;">'+lbl.textContent+'</div>'+
          '<div style="font-size:20px;font-weight:700;color:#0f2d5c;">'+val.textContent+'</div>'+
          '</div>';
      }
    });
  }

  // ── Build clean print HTML from live DOM nodes ────────────
  // Clone the printable area and strip buttons/interactive elements
  var sourceEl = tsPrintable || tsContent;
  var clone = sourceEl.cloneNode(true);

  // Remove all buttons from clone
  var btns = clone.querySelectorAll('button, input, select, .ts-no-print');
  for(var i=btns.length-1; i>=0; i--){ btns[i].parentNode.removeChild(btns[i]); }

  // Remove onclick attributes
  var allEls = clone.querySelectorAll('[onclick]');
  for(var j=0; j<allEls.length; j++){ allEls[j].removeAttribute('onclick'); }

  // Remove cursor:pointer rows
  var rows = clone.querySelectorAll('tr[style]');
  for(var k=0; k<rows.length; k++){
    rows[k].style.cursor = '';
  }

  // ── Assemble final print HTML ─────────────────────────────
  var printHTML =
    '<div style="direction:rtl;font-family:Cairo,sans-serif;padding:15px;color:#1a1a2e;">'+

    // Header
    '<div style="text-align:center;margin-bottom:20px;padding-bottom:14px;'+
      'border-bottom:3px solid #0f2d5c;">'+
      '<div style="font-size:24px;font-weight:700;color:#0f2d5c;">🏫 مدرسة DSBA</div>'+
      '<div style="font-size:17px;font-weight:600;margin-top:6px;color:#333;">'+
        'كشف الحضور والأعمال — فريق الصيانة</div>'+
      '<div style="font-size:12px;color:#666;margin-top:8px;'+
        'background:#f0f4f8;border-radius:6px;padding:6px 12px;display:inline-block;">'+
        '📅 الفترة: <strong>'+fromVal+'</strong>'+
        (toVal&&toVal!==fromVal?' &nbsp;→&nbsp; <strong>'+toVal+'</strong>':'')+
        ' &nbsp;&nbsp;|&nbsp;&nbsp; 🖨 '+new Date().toLocaleDateString('ar-EG')+
      '</div>'+
    '</div>'+

    // Stats summary
    (statsRows?
      '<div style="display:flex;gap:12px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;">'+
      statsRows+'</div>':'') +

    // Main content from cloned DOM
    clone.innerHTML +

    '</div>';

  // ── Write to printArea and print ──────────────────────────
  var pc = $('printContent');
  var pa = $('printArea');
  if(!pc || !pa){ window.print(); return; }

  pc.innerHTML = printHTML;
  pa.style.display = 'block';

  // Small delay to ensure DOM renders before print dialog
  setTimeout(function(){
    window.print();
    setTimeout(function(){
      pa.style.display = 'none';
      pc.innerHTML = '';
    }, 2000);
  }, 150);
};

function checkWarrantyAlerts(){
  var today = Date.now();
  var alertsSent = [];

  Object.entries(assets).forEach(function(e){
    var id = e[0], a = e[1];
    if(!a.warrantyEnd || !a.warrantyAlertDays) return;
    if(a.status === 'retired') return;

    var endTs       = a.warrantyEnd;
    var alertDays   = parseInt(a.warrantyAlertDays)||30;
    var alertTs     = endTs - alertDays*24*3600*1000;
    var daysLeft    = Math.ceil((endTs - today) / (24*3600*1000));

    // Only alert if: within alert window AND warranty not expired more than 30 days ago
    if(today >= alertTs && daysLeft > -30){
      var lastAlertKey = 'dsba_warranty_alerted_'+id;
      var lastAlert    = parseInt(localStorage.getItem(lastAlertKey)||'0');
      var oneDayMs     = 24*3600*1000;

      // Don't repeat alert more than once per day
      if(today - lastAlert < oneDayMs) return;

      var msg = daysLeft > 0
        ? '⚠️ ضمان '+a.name+' سينتهي خلال '+daysLeft+' يوم ('+new Date(endTs).toLocaleDateString('ar-EG')+')'
        : '❌ ضمان '+a.name+' انتهى منذ '+Math.abs(daysLeft)+' يوم';

      // Send in-app notification to admin(s)
      Object.entries(users).forEach(function(ue){
        if(ue[1].role==='admin' || ue[1].role==='dept_admin'){
          sendNotification(ue[0], '🛡️ تنبيه ضمان', msg, '');
        }
      });

      // Also send to current user if storekeeper
      if(CU.role==='storekeeper'){
        sendNotification(CID, '🛡️ تنبيه ضمان', msg, '');
      }

      localStorage.setItem(lastAlertKey, today.toString());
      alertsSent.push({name:a.name, daysLeft:daysLeft});
    }
  });

  // Show toast if any alerts triggered NOW
  if(alertsSent.length > 0 && CU){
    showWarrantyToast(alertsSent);
  }
}

function showWarrantyToast(alerts){
  var existing = document.getElementById('_warrantyToast');
  if(existing) existing.remove();

  var toast = document.createElement('div');
  toast.id = '_warrantyToast';
  toast.style.cssText =
    'position:fixed;bottom:24px;right:24px;z-index:99999;'+
    'background:#1a1a2e;color:#fff;border-radius:12px;padding:16px 20px;'+
    'box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:360px;font-family:Cairo,sans-serif;'+
    'direction:rtl;animation:slideInRight .3s ease;';

  toast.innerHTML =
    '<div style="display:flex;align-items:flex-start;gap:12px;">'+
      '<div style="font-size:28px;flex-shrink:0;">🛡️</div>'+
      '<div style="flex:1;">'+
        '<div style="font-size:14px;font-weight:700;margin-bottom:6px;color:#fbbf24;">تنبيهات الضمان</div>'+
        alerts.slice(0,3).map(function(a){
          return '<div style="font-size:12px;margin-bottom:3px;color:'+(a.daysLeft<=0?'#f87171':'#e5e7eb')+';">'+
            (a.daysLeft>0?'⚠ ':'❌ ')+a.name+
            (a.daysLeft>0?' — '+a.daysLeft+' يوم متبقي':' — انتهى الضمان')+
          '</div>';
        }).join('')+
        (alerts.length>3?'<div style="font-size:11px;color:#9ca3af;">و '+(alerts.length-3)+' أخرى...</div>':'')+
      '</div>'+
      '<button onclick="document.getElementById(\'_warrantyToast\').remove()" '+
        'style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;'+
        'width:22px;height:22px;cursor:pointer;font-size:12px;flex-shrink:0;">✕</button>'+
    '</div>'+
    '<button onclick="showPage(\'assets\');document.getElementById(\'_warrantyToast\').remove();" '+
      'style="width:100%;margin-top:10px;padding:6px;background:#e8a020;border:none;border-radius:8px;'+
      'color:#fff;font-family:Cairo,sans-serif;font-size:12px;font-weight:600;cursor:pointer;">'+
      '📦 عرض الأصول'+
    '</button>';

  document.body.appendChild(toast);

  // Auto-dismiss after 10 seconds
  setTimeout(function(){
    var el = document.getElementById('_warrantyToast');
    if(el) el.style.cssText += 'opacity:0;transition:opacity .5s;';
    setTimeout(function(){
      var el2 = document.getElementById('_warrantyToast');
      if(el2) el2.remove();
    }, 600);
  }, 10000);
}

// ─── Help System Functions ─────────────────────────────────────

window.openContextHelp = function(){
  var activePage = 'dashboard';
  var activeNav = document.querySelector('.nav-item.active');
  if(activeNav) activePage = activeNav.id.replace('nav-','');
  openHelpModal(activePage);
};

window.openHelpModal = function(pageId){
  var overlay = document.getElementById('helpModalOverlay');
  if(!overlay) return;
  var pageData = HELP_PAGES[pageId] || HELP_PAGES['dashboard'];
  var title = document.getElementById('helpModalTitle');
  if(title) title.textContent = (pageData.icon||'❓') + ' ' + pageData.ar + ' — ' + pageData.en;
  overlay.classList.add('open');
  helpCurrentTab = 'guide';
  document.querySelectorAll('.help-tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab==='guide'); });
  renderHelpGuide(pageId);
};

window.closeHelpModal = function(){
  var overlay = document.getElementById('helpModalOverlay');
  if(overlay) overlay.classList.remove('open');
};

window.switchHelpTab = function(tab){
  helpCurrentTab = tab;
  document.querySelectorAll('.help-tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab); });
  if(tab==='guide'){
    var activePage = 'dashboard';
    var activeNav = document.querySelector('.nav-item.active');
    if(activeNav) activePage = activeNav.id.replace('nav-','');
    renderHelpGuide(activePage);
  } else if(tab==='faq'){
    renderHelpFAQ();
  } else if(tab==='roles'){
    renderHelpRoles();
  } else if(tab==='ai'){
    renderHelpAI();
  }
};

function renderHelpGuide(pageId){
  var body = document.getElementById('helpModalBody');
  if(!body) return;
  var d = HELP_PAGES[pageId] || HELP_PAGES['dashboard'];
  var isAr = currentLang === 'ar';

  // Page selector
  var pagesHtml = Object.entries(HELP_PAGES).map(function(e){
    var k=e[0], v=e[1];
    return '<button onclick="renderHelpGuide(\''+k+'\')" style="padding:6px 12px;border:1px solid '+(pageId===k?'var(--primary)':'#e5e7eb')+';border-radius:8px;background:'+(pageId===k?'var(--primary)':'transparent')+';color:'+(pageId===k?'#fff':'var(--text-muted)')+';font-family:Cairo,sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;white-space:nowrap;">'+v.icon+' '+(isAr?v.ar:v.en)+'</button>';
  }).join('');

  var stepsHtml = (d.steps||[]).map(function(s,i){
    return '<div class="help-step">'+
      '<div class="help-step-num">'+(i+1)+'</div>'+
      '<div class="help-step-content">'+
        '<div class="help-step-title">'+(isAr?s.ar:s.en)+' <span class="help-step-title-en">'+(isAr?s.en:s.ar)+'</span></div>'+
        '<div class="help-step-desc">'+(isAr?(s.desc_ar||''):(s.desc_en||''))+'</div>'+
      '</div>'+
    '</div>';
  }).join('');

  var tipsHtml = (d.tips||[]).map(function(tip){
    return '<div class="help-tip"><div class="help-tip-icon">💡</div><div class="help-tip-text">'+(isAr?tip.ar:tip.en)+'</div></div>';
  }).join('');

  var warnsHtml = (d.warnings||[]).map(function(w){
    return '<div class="help-warning"><div class="help-tip-icon">⚠️</div><div class="help-warning-text">'+(isAr?w.ar:w.en)+'</div></div>';
  }).join('');

  body.innerHTML =
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #e5e7eb;">'+pagesHtml+'</div>'+
    '<div class="help-section">'+
      '<div class="card-title" style="font-size:16px;margin-bottom:16px;">'+d.icon+' '+(isAr?d.ar:d.en)+' <span style="font-size:12px;color:var(--text-muted);font-weight:400;">'+(isAr?d.en:d.ar)+'</span></div>'+
      stepsHtml+
    '</div>'+
    (tipsHtml ? '<div class="help-section"><div style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;">💡 '+(isAr?'نصائح مفيدة':'Useful Tips')+'</div>'+tipsHtml+'</div>' : '')+
    (warnsHtml ? '<div class="help-section"><div style="font-size:13px;font-weight:700;color:#dc2626;margin-bottom:10px;">⚠️ '+(isAr?'تنبيهات':'Warnings')+'</div>'+warnsHtml+'</div>' : '');
}

function renderHelpFAQ(){
  var body = document.getElementById('helpModalBody');
  if(!body) return;
  var isAr = currentLang === 'ar';

  var catsHtml = FAQ_DATA.map(function(cat, ci){
    var itemsHtml = cat.items.map(function(item, ii){
      var fid = 'faq_'+ci+'_'+ii;
      return '<div class="faq-item">'+
        '<button class="faq-question" id="fqb_'+fid+'" onclick="toggleFAQ(\''+fid+'\')">'+
          '<span class="faq-q-icon">❓</span>'+

window.toggleFAQ = function(fid){
  var qBtn = document.getElementById('fqb_'+fid);
  var ans  = document.getElementById('fqa_'+fid);
  if(!qBtn||!ans) return;
  var isOpen = ans.classList.contains('open');
  // Close all
  document.querySelectorAll('.faq-answer.open').forEach(function(a){ a.classList.remove('open'); });
  document.querySelectorAll('.faq-question.open').forEach(function(q){ q.classList.remove('open'); });
  if(!isOpen){ ans.classList.add('open'); qBtn.classList.add('open'); }
};

window.faqSearch = function(val){
  val = val.trim().toLowerCase();
  var items = document.querySelectorAll('.faq-item');
  var cats  = document.querySelectorAll('.faq-category');
  items.forEach(function(item){
    var text = item.textContent.toLowerCase();
    item.style.display = (!val||text.includes(val)) ? '' : 'none';
  });
  cats.forEach(function(cat){
    var visibles = cat.querySelectorAll('.faq-item:not([style*="display: none"])');
    cat.style.display = visibles.length ? '' : 'none';
  });
};

  // Welcome message
  if(!helpAiHistory.length){
    helpAiHistory = [{role:'assistant', content: isAr
      ? '👋 أهلاً! أنا مساعد DSBA الذكي.\nاسألني عن أي شيء في النظام وسأساعدك فوراً.'
      : '👋 Hello! I\'m the DSBA smart assistant.\nAsk me anything about the system and I\'ll help you right away.'
    }];
  }

  var msgsHtml = helpAiHistory.map(function(m){
    var isUser = m.role==='user';
    return '<div class="ai-chat-msg '+(isUser?'user':'bot')+'">'+
      '<div class="ai-chat-avatar">'+(isUser?'👤':'🤖')+'</div>'+
      '<div class="ai-chat-bubble">'+m.content.replace(/\n/g,'<br>')+'</div>'+
    '</div>';
  }).join('');

  body.innerHTML =
    '<div class="ai-help-wrap">'+
      '<div class="ai-quick-btns">'+quickHtml+'</div>'+
      '<div class="ai-chat-messages" id="aiHelpMessages">'+msgsHtml+'</div>'+
      '<div class="ai-chat-input-row">'+
        '<input class="ai-chat-input" id="aiHelpInput" placeholder="'+(isAr?'اكتب سؤالك هنا...':'Type your question here...')+'" onkeydown="if(event.key===\'Enter\')sendHelpMessage()">'+
        '<button class="ai-chat-send" onclick="sendHelpMessage()">➤</button>'+
      '</div>'+
    '</div>';
}

window.sendHelpMessage = function(preset){
  var input = document.getElementById('aiHelpInput');
  var msg = preset || (input ? input.value.trim() : '');
  if(!msg) return;
  if(input) input.value = '';

  helpAiHistory.push({role:'user', content:msg});

  var msgsEl = document.getElementById('aiHelpMessages');
  if(msgsEl){
    var userBubble = document.createElement('div');
    userBubble.className = 'ai-chat-msg user';
    userBubble.innerHTML = '<div class="ai-chat-avatar">👤</div><div class="ai-chat-bubble">'+msg+'</div>';
    msgsEl.appendChild(userBubble);

    var typingEl = document.createElement('div');
    typingEl.className = 'ai-chat-msg bot';
    typingEl.id = 'aiTyping';
    typingEl.innerHTML = '<div class="ai-chat-avatar">🤖</div><div class="ai-chat-bubble"><div class="ai-chat-typing"><span></span><span></span><span></span></div></div>';
    msgsEl.appendChild(typingEl);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  var isAr = currentLang === 'ar';
  var systemPrompt = isAr
    ? 'أنت مساعد ذكي لنظام DSBA لإدارة الصيانة والمخزون المدرسي. أجب بإيجاز وبشكل مفيد على أسئلة المستخدمين حول:\n- البلاغات: كيف ترفعها، حالاتها، الأولويات\n- الأصول: كيف تضيف جهاز، باركود، ضمان\n- المخزن: كيف تصرف قطعة غيار\n- المستخدمين: الصلاحيات والأدوار\n- التقارير وكشف الحضور\nأجب باللغة العربية بشكل مختصر ومفيد.'
    : 'You are a smart assistant for DSBA - a school maintenance and inventory management system. Answer briefly and helpfully about:\n- Tickets: how to submit, statuses, priorities\n- Assets: how to add devices, barcodes, warranty\n- Store: how to issue spare parts\n- Users: roles and permissions\n- Reports and timesheets\nAnswer in English concisely.';

  var messages = [{role:'user', content: systemPrompt + '\n\nUser question: ' + msg}];

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 400,
      messages: messages
    })
  }).then(function(r){ return r.json(); })
  .then(function(data){
    var reply = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text : (isAr?'عذراً، حدث خطأ.':'Sorry, an error occurred.');
    helpAiHistory.push({role:'assistant', content:reply});
    var typing = document.getElementById('aiTyping');
    if(typing) typing.remove();
    var msgs = document.getElementById('aiHelpMessages');
    if(msgs){
      var botBubble = document.createElement('div');
      botBubble.className = 'ai-chat-msg bot';
      botBubble.innerHTML = '<div class="ai-chat-avatar">🤖</div><div class="ai-chat-bubble">'+reply.replace(/\n/g,'<br>')+'</div>';
      msgs.appendChild(botBubble);
      msgs.scrollTop = msgs.scrollHeight;
    }
  }).catch(function(){
    var typing = document.getElementById('aiTyping');
    if(typing) typing.remove();
    var fallback = isAr ? '💡 للمساعدة الفورية: اضغط تبويب "الأسئلة الشائعة" أو "دليل الصفحة" للحصول على شرح تفصيلي.' : '💡 For immediate help: check the "FAQ" or "Page Guide" tabs for detailed instructions.';
    helpAiHistory.push({role:'assistant', content: fallback});
    var msgs = document.getElementById('aiHelpMessages');
    if(msgs){
      var botBubble = document.createElement('div');
      botBubble.className = 'ai-chat-msg bot';
      botBubble.innerHTML = '<div class="ai-chat-avatar">🤖</div><div class="ai-chat-bubble">'+fallback+'</div>';
      msgs.appendChild(botBubble);
      msgs.scrollTop = msgs.scrollHeight;
    }
  });
};

// Add Help page to navigation — safe injection after buildNav runs
function addHelpNavItem(){
  var nav = document.getElementById('sidebarNav');
  if(!nav || document.getElementById('nav-help')) return;
  var isAr = currentLang === 'ar';
  var sep = document.createElement('div');
  sep.className = 'nav-section';
  sep.textContent = isAr ? 'دعم' : 'Support';
  nav.appendChild(sep);
  var helpItem = document.createElement('div');
  helpItem.className = 'nav-item';
  helpItem.id = 'nav-help';
  helpItem.innerHTML = '<span class="nav-icon">❓</span> '+(isAr?'مركز المساعدة':'Help Center');
  helpItem.onclick = function(){
    document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
    helpItem.classList.add('active');
    var pt = document.getElementById('pageTitle');
    if(pt) pt.textContent = isAr ? 'مركز المساعدة' : 'Help Center';
    renderFAQPage();
  };
  nav.appendChild(helpItem);
}
// Inject after login completes — poll until sidebarNav is populated
(function waitForNav(){
  var nav = document.getElementById('sidebarNav');
  if(nav && nav.children.length > 0){ addHelpNavItem(); return; }
  setTimeout(waitForNav, 500);
})();

function renderFAQPage(){
  var isAr = currentLang === 'ar';
  var catsHtml = FAQ_DATA.map(function(cat, ci){
    var itemsHtml = cat.items.map(function(item, ii){
      var fid = 'pfaq_'+ci+'_'+ii;
      return '<div class="faq-item">'+
        '<button class="faq-question" id="pfqb_'+fid+'" onclick="toggleFAQ2(\''+fid+'\')">'+
          '<span class="faq-q-icon">❓</span>'+
          '<span class="faq-q-text">'+(isAr?item.q_ar:item.q_en)+
            '<span class="faq-q-en">'+(isAr?item.q_en:item.q_ar)+'</span>'+
          '</span>'+
          '<span class="faq-arrow">▾</span>'+
        '</button>'+
        '<div class="faq-answer" id="pfqa_'+fid+'">'+
          '<div class="faq-answer-inner">'+(isAr?item.a_ar:item.a_en)+
            '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #e5e7eb;font-size:11px;color:var(--text-muted);">'+(isAr?item.a_en:item.a_ar)+'</div>'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
    return '<div class="faq-category">'+
      '<div class="faq-cat-title">'+(isAr?cat.cat_ar:cat.cat_en)+'</div>'+
      itemsHtml+
    '</div>';
  }).join('');

  var guideBtnsHtml = Object.entries(HELP_PAGES).map(function(e){
    var k=e[0], v=e[1];
    return '<button onclick="openHelpModal(\''+k+'\')" style="padding:10px 14px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;cursor:pointer;font-family:Cairo,sans-serif;font-size:13px;text-align:center;display:flex;flex-direction:column;gap:4px;align-items:center;transition:all 0.15s;" onmouseover="this.style.background=\'#f0f4ff\';this.style.borderColor=\'var(--primary)\'" onmouseout="this.style.background=\'#fff\';this.style.borderColor=\'#e5e7eb\'">'+
      '<span style="font-size:22px;">'+v.icon+'</span>'+
      '<span style="font-size:12px;font-weight:600;color:var(--primary);">'+(isAr?v.ar:v.en)+'</span>'+
    '</button>';
  }).join('');

  document.getElementById('mainContent').innerHTML =
    '<div class="card" style="margin-bottom:20px;">'+
      '<div class="card-title"><span class="icon">📖</span> '+(isAr?'أدلة الصفحات — Page Guides':'Page Guides — أدلة الصفحات')+'</div>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;">'+guideBtnsHtml+'</div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-title"><span class="icon">❓</span> '+(isAr?'الأسئلة الشائعة — FAQ':'FAQ — الأسئلة الشائعة')+'</div>'+
      '<div class="faq-search-wrap">'+
        '<span class="faq-search-icon">🔍</span>'+
        '<input class="faq-search" id="pageFaqSearch" placeholder="'+(isAr?'ابحث في الأسئلة...':'Search questions...')+'" oninput="faqPageSearch(this.value)">'+
      '</div>'+
      '<div id="pageFaqContent">'+catsHtml+'</div>'+
    '</div>';
}

window.toggleFAQ2 = function(fid){
  var qBtn = document.getElementById('pfqb_'+fid);
  var ans  = document.getElementById('pfqa_'+fid);
  if(!qBtn||!ans) return;
  var isOpen = ans.classList.contains('open');
  document.querySelectorAll('#pageFaqContent .faq-answer.open').forEach(function(a){ a.classList.remove('open'); });
  document.querySelectorAll('#pageFaqContent .faq-question.open').forEach(function(q){ q.classList.remove('open'); });
  if(!isOpen){ ans.classList.add('open'); qBtn.classList.add('open'); }
};

window.faqPageSearch = function(val){
  val = val.trim().toLowerCase();
  var items = document.querySelectorAll('#pageFaqContent .faq-item');
  var cats  = document.querySelectorAll('#pageFaqContent .faq-category');
  items.forEach(function(item){
    item.style.display = (!val||item.textContent.toLowerCase().includes(val)) ? '' : 'none';
  });
  cats.forEach(function(cat){
    var visibles = cat.querySelectorAll('.faq-item:not([style*="display: none"])');
    cat.style.display = visibles.length ? '' : 'none';
  });
};

// Keyboard shortcut: F1 = open help
document.addEventListener('keydown', function(e){
  if(e.key==='F1'){ e.preventDefault(); window.openContextHelp(); }
});
</script>
</body>
